<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Overlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
:root{--red:#c8102e;--gold:#f5c518;--bgreen:#43a047;--dg:#1b5e20}
html,body{background:transparent;width:100%;height:100%;overflow:hidden}

/* ── OVERLAY CONTAINER ── */
.ov{
  position:fixed;
  left:20px;right:20px;bottom:20px;
  background:rgba(8,12,24,.70);
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;overflow:hidden;
  display:flex;flex-direction:column;
  opacity:0.7;
}

/* ── TOP ROW: イニング + チーム名 + スコア表 + 得点 ── */
.ov-top{display:flex;align-items:stretch;min-height:90px;overflow:visible}

/* イニング */
.ov-inn{
  background:rgba(200,16,46,.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 14px;flex-shrink:0;gap:2px;
  overflow:visible;position:relative;
}
.ov-inn-num{
  font-size:clamp(52px,11vw,76px);font-weight:700;color:#fff;line-height:1;
  font-variant-numeric:tabular-nums;
}
.ov-inn-row{display:flex;align-items:center;gap:4px;overflow:visible}
.ov-inn-tb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.ov-inn-tb span{font-size:clamp(11px,2.5vw,16px);font-weight:700;color:rgba(255,255,255,.28);line-height:1}
.ov-inn-tb span.active{color:#fff}

/* チーム名 */
.ov-teams{display:flex;flex-direction:column;flex-shrink:0;border-left:1px solid rgba(255,255,255,.1)}
.ov-team-row{display:flex;align-items:center;flex:1;padding:4px 10px;gap:6px}
.ov-team-row:first-child{border-bottom:1px solid rgba(255,255,255,.08)}
.ov-team-ind{width:4px;border-radius:2px;align-self:stretch;background:rgba(255,255,255,.1);flex-shrink:0}
.ov-team-ind.active{background:var(--red)}
.ov-team-name{font-size:clamp(14px,3.5vw,22px);font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}

/* イニングスコア表（TOP ROWの下・全幅） */
.ov-ist{border-top:1px solid rgba(255,255,255,.06);padding:2px 0}
.ov-ist table{border-collapse:collapse;width:100%;table-layout:fixed}
.ov-ist td{
  text-align:center;padding:3px 1px;
  font-size:clamp(9px,2vw,13px);font-weight:600;
  color:rgba(255,255,255,.25);font-variant-numeric:tabular-nums;
}
.ov-ist tr:first-child td{border-bottom:1px solid rgba(255,255,255,.05)}
.ov-ist td.cur{color:rgba(255,255,255,.75)}

/* 合計得点 */
.ov-scores{display:flex;flex-direction:column;flex-shrink:0;border-left:1px solid rgba(255,255,255,.1)}
.ov-score-cell{display:flex;align-items:center;justify-content:center;flex:1;padding:0 14px}
.ov-score-cell:first-child{border-bottom:1px solid rgba(255,255,255,.08)}
.ov-score-num{font-size:clamp(36px,8vw,56px);font-weight:700;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
.ov-bot{display:flex;align-items:stretch;border-top:1px solid rgba(255,255,255,.08)}

/* BSO */
.ov-bso{display:flex;flex-direction:column;justify-content:space-evenly;padding:6px 8px;flex-shrink:0;gap:3px;border-right:1px solid rgba(255,255,255,.08)}
.ov-bso-line{display:flex;align-items:center;gap:2px}

/* ダイヤモンド */
.ov-diamond{flex:1;display:flex;align-items:center;justify-content:center;padding:8px}
.ov-diamond svg{width:clamp(60px,14vw,90px)}

/* 打者・投手 */
.ov-players{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;padding:6px 10px;border-left:1px solid rgba(255,255,255,.08)}
.ov-player-row{display:flex;align-items:center;gap:6px;overflow:hidden}
.ov-player-tag{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1.5px;flex-shrink:0}
.ov-player-name{font-size:clamp(11px,2.8vw,16px);font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="ov" id="ov" style="overflow:visible">

  <!-- TOP ROW -->
  <div class="ov-top">
    <!-- イニング -->
    <div class="ov-inn">
      <div class="ov-inn-row">
        <div class="ov-inn-num" id="ov-inn">1</div>
        <div class="ov-inn-tb">
          <span id="ov-tb-top" class="active">▲</span>
          <span id="ov-tb-bot">▼</span>
        </div>
      </div>
    </div>
    <!-- チーム名 -->
    <div class="ov-teams">
      <div class="ov-team-row"><div class="ov-team-ind active" id="ov-ind-away"></div><div class="ov-team-name" id="ov-aname">先攻</div></div>
      <div class="ov-team-row"><div class="ov-team-ind" id="ov-ind-home"></div><div class="ov-team-name" id="ov-hname">後攻</div></div>
    </div>
    <!-- 合計得点 -->
    <div class="ov-scores">
      <div class="ov-score-cell"><div class="ov-score-num" id="ov-score-away">0</div></div>
      <div class="ov-score-cell"><div class="ov-score-num" id="ov-score-home">0</div></div>
    </div>
  </div>

  <!-- イニングスコア表（TOP ROWの下） -->
  <div class="ov-ist">
    <table><thead></thead><tbody id="ov-ist-body"></tbody></table>
  </div>

  <!-- BOTTOM ROW -->
  <div class="ov-bot">

    <!-- BSO -->
    <div class="ov-bso">
      <div class="ov-bso-line">
        <svg width="102" height="28" viewBox="0 0 66 20" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="#333" id="ov-bd1"/>
          <circle cx="33" cy="10" r="9" fill="#333" id="ov-bd2"/>
          <circle cx="56" cy="10" r="9" fill="#333" id="ov-bd3"/>
        </svg>
      </div>
      <div class="ov-bso-line">
        <svg width="102" height="28" viewBox="0 0 66 20" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="#333" id="ov-sd1"/>
          <circle cx="33" cy="10" r="9" fill="#333" id="ov-sd2"/>
        </svg>
      </div>
      <div class="ov-bso-line">
        <svg width="102" height="28" viewBox="0 0 66 20" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="#282828" stroke="#444" stroke-width="1.5" id="ov-od1"/>
          <circle cx="33" cy="10" r="9" fill="#282828" stroke="#444" stroke-width="1.5" id="ov-od2"/>
        </svg>
      </div>
    </div>

    <!-- ダイヤモンド（等角投影・横長）+ 投手捕手 -->
    <div style="flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.08)">
      <div style="display:flex;align-items:center;justify-content:center;padding:5px 8px">
        <svg viewBox="0 0 160 56" xmlns="http://www.w3.org/2000/svg" style="width:clamp(110px,28vw,170px)">
          <!-- 2塁（奥・倍サイズ） -->
          <polygon id="ov-b2" points="80,-3 96,5 80,13 64,5" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
          <!-- 3塁（左・倍サイズ） -->
          <polygon id="ov-b3" points="10,21 26,29 10,37 -6,29" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
          <!-- 1塁（右・倍サイズ） -->
          <polygon id="ov-b1" points="150,21 166,29 150,37 134,29" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
          <!-- ホームベース（上下逆・手前・はみ出し可） -->
          <polygon points="80,59 93,51 93,43 80,43 67,43 67,51" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
        </svg>
      </div>
      <div style="display:flex;border-top:1px solid rgba(255,255,255,.06)">
        <div style="flex:1;display:flex;align-items:center;gap:5px;padding:3px 8px;border-right:1px solid rgba(255,255,255,.06)">
          <span style="font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1.5px;flex-shrink:0">P</span>
          <span style="font-size:11px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="ov-pitcher">-</span>
        </div>
        <div style="flex:1;display:flex;align-items:center;gap:5px;padding:3px 8px">
          <span style="font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1.5px;flex-shrink:0">C</span>
          <span style="font-size:11px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="ov-catcher">-</span>
        </div>
      </div>
    </div>

    <!-- 打者 -->
    <div class="ov-players" style="border-left:1px solid rgba(255,255,255,.08)">
      <div class="ov-player-row"><span class="ov-player-tag">B</span><span class="ov-player-name" id="ov-batter">-</span></div>
      <div style="display:flex;flex-direction:column;gap:2px;padding:0 0 4px 0">
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:7px;color:rgba(255,255,255,.2);letter-spacing:1px;flex-shrink:0">NEXT</span>
          <span style="font-size:10px;color:rgba(255,255,255,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="ov-batter-next">-</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:7px;color:rgba(255,255,255,.15);letter-spacing:1px;flex-shrink:0">ON DECK</span>
          <span style="font-size:10px;color:rgba(255,255,255,.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="ov-batter-next2">-</span>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
function g(id){return document.getElementById(id)}
function set(id,v){const e=g(id);if(e)e.textContent=v}

function applyState(s){
  if(!s)return;
  const inn=s.inn||1, isTop=s.top!==false;
  const n=Math.max(s.maxInn||7,inn);
  const asc=s.asc||[], hsc=s.hsc||[];
  const xOn=s.xOn||{};

  // イニング・表裏
  set('ov-inn',inn);
  g('ov-tb-top').className=isTop?'active':'';
  g('ov-tb-bot').className=!isTop?'active':'';

  // チーム名・インジケーター
  set('ov-aname',s.aab||'先攻');
  set('ov-hname',s.hnm||'後攻');
  g('ov-ind-away').className='ov-team-ind'+(isTop?' active':'');
  g('ov-ind-home').className='ov-team-ind'+(!isTop?' active':'');

  // 合計得点
  const at=asc.filter(x=>typeof x==='number').reduce((a,b)=>a+b,0);
  const ht=hsc.filter(x=>typeof x==='number').reduce((a,b)=>a+b,0);
  set('ov-score-away',at);
  set('ov-score-home',ht);

  // スコア表ヘッダー
  const head=g('ov-sb-head');
  if(head){
    head.innerHTML='';
    for(let i=1;i<=n;i++) head.innerHTML+=`<th class="${i===inn?'cur':''}">${i}</th>`;
  }
  // スコア表行
  [[g('ov-sb-away'),asc,'away'],[g('ov-sb-home'),hsc,'home']].forEach(([row,sc,team])=>{
    if(!row)return;
    row.innerHTML='';
    for(let i=0;i<n;i++){
      const isCur=i+1===inn;
      const val=sc[i];
      const xFlag=xOn[`${team}-${i}`]||false;
      const cls=isCur?(isTop?'cur-top':'cur-bot'):'';
      let disp=val===null?'<span class="blank">－</span>':val==='x'?'<span style="color:#555">×</span>':`${val}${xFlag?'<span style="color:rgba(255,90,90,.7);font-size:.7em">×</span>':''}`;
      row.innerHTML+=`<td class="${cls}">${disp}</td>`;
    }
  });

  // BSO (フラット)
  for(let i=0;i<3;i++){const d=g('ov-bd'+(i+1));if(d)d.setAttribute('fill',i<(s.b||0)?'#43a047':'#333');}
  for(let i=0;i<2;i++){
    const sd=g('ov-sd'+(i+1));if(sd)sd.setAttribute('fill',i<(s.s||0)?'#f5c518':'#333');
    const od=g('ov-od'+(i+1));if(od){od.setAttribute('fill',i<(s.o||0)?'#c8102e':'#282828');od.setAttribute('stroke',i<(s.o||0)?'#7a0000':'#444');}
  }

  // ダイヤモンド（フラット）
  const r=s.r||{};
  [1,2,3].forEach(n=>{
    const e=g('ov-b'+n);
    if(e){e.setAttribute('fill',r[n]?'#f5c518':'rgba(255,255,255,.12)');e.setAttribute('stroke',r[n]?'#b8860b':'rgba(255,255,255,.3)');}
  });

  // イニングスコア表（得点のみ）
  const istBody=g('ov-ist-body');
  if(istBody){
    let html='';
    [[asc,'away'],[hsc,'home']].forEach(([sc,team])=>{
      html+='<tr>';
      for(let i=0;i<n;i++){
        const isCur=i+1===inn;
        const val=sc[i];
        const disp=val===null?'':val==='x'?'×':String(val);
        // 3の倍数の右側に広めのボーダー
        const borderRight=(i+1)%3===0?'border-right:2px solid rgba(255,255,255,.12)':'border-right:1px solid rgba(255,255,255,.06)';
        html+=`<td class="${isCur?'cur':''}" style="${borderRight}">${disp}</td>`;
      }
      html+='</tr>';
    });
    istBody.innerHTML=html;
  }

  // 打者・投手・捕手
  set('ov-batter',s.batter||'-');
  set('ov-batter-next', s.batterNext||'-');
  set('ov-batter-next2', s.batterNext2||'-');
  set('ov-pitcher',s.pitcher||'-');
  set('ov-catcher',s.catcher||'-');
}

// WebSocket
let ws=null;
function connectWS(){
  ws=new WebSocket('wss://'+location.host);
  ws.onmessage=e=>{
    const h=t=>{try{applyState(JSON.parse(t));}catch(err){}};
    if(e.data instanceof Blob)e.data.text().then(h);else h(e.data);
  };
  ws.onclose=()=>setTimeout(connectWS,2000);
  ws.onerror=()=>ws.close();
}
connectWS();
</script>
</body>
</html>
