<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Overlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
:root{--red:#c8102e;--gold:#f5c518;--green:#2e7d32;--bgreen:#43a047}
html,body{background:transparent;width:100%;height:100%;overflow:hidden}

.ov{position:fixed;bottom:20px;left:20px;width:70%;background:rgba(8,12,24,.70);border:1px solid rgba(255,255,255,.1);border-radius:7px;overflow:hidden;display:flex;flex-direction:column;}

/* 全体背景画像（透過） */
.ov-bg-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:.25;pointer-events:none;z-index:0;
}
/* 全コンテンツをz-index:1で前面に */
.ov-clock,.ov-top,.ov-bottom,.ov-table-wrap{position:relative;z-index:1}

/* 時計エリアの画像（右端） */
.ov-clock{
  background:rgba(0,0,0,.4);text-align:center;font-size:60px;font-weight:600;
  color:rgba(255,255,255,.7);letter-spacing:2px;padding:4px 50px 4px 6px;
  font-variant-numeric:tabular-nums;border-bottom:1px solid rgba(255,255,255,.06);
  font-family:menlo,monospace;position:relative;overflow:hidden;
}
.ov-clock-logo{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  width:28px;height:28px;
  background-size:contain;background-repeat:no-repeat;background-position:center;
  opacity:.8;
}
.clock-only{position:fixed;top:20px;right:20px;background:rgba(8,12,24,.70);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:6px 20px;font-size:60px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:2px;font-variant-numeric:tabular-nums;font-family:menlo,monospace;}

/* SCORE */
.ov-top{display:flex;align-items:stretch}
.ov-inn{background:rgba(200,16,46,.70);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 64px;min-width:90px;gap:2px;flex-shrink:0}
.ov-inn-arr-top{font-size:88px;font-weight:900;color:rgba(255,255,255,.95);line-height:1;transition:opacity .15s}
.ov-inn-arr-top.inactive{opacity:.2}
.ov-inn-num{font-size:128px;font-weight:700;color:#fff;line-height:1;margin:4px 0}
.ov-inn-arr-bot{font-size:88px;font-weight:900;color:rgba(255,255,255,.95);line-height:1;transition:opacity .15s}
.ov-inn-arr-bot.inactive{opacity:.2}
.ov-teams{flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.1);min-width:0}
.ov-team{display:flex;align-items:center;padding:6px 14px;gap:0;flex:1;overflow:hidden;position:relative}
.ov-team:first-child{border-bottom:1px solid rgba(255,255,255,.08)}
/* チームロゴ: 背景として透過50%表示 */
.ov-team-logo{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background-size:contain;background-repeat:no-repeat;background-position:left center;
  opacity:.5;pointer-events:none;
}
/* チーム名: はみ出る場合は縮小 */
.ov-tname{
  font-weight:700;color:#fff;
  white-space:nowrap;padding-right:0.5em;
  flex-shrink:1;min-width:0;
  /* JSで動的にフォントサイズを調整 */
  font-size:90px;
  overflow:hidden;
}
.ov-tspacer{flex:1}
.ov-tscore{font-size:112px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;flex-shrink:0}

/* BSO + DIAMOND */
.ov-diamond{border-left:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:12px 16px;gap:14px;flex-shrink:0;width:auto;}
.bso-rows{display:flex;flex-direction:column;gap:18px}
.bso-row{display:flex;gap:12px;align-items:center}
.bso-lbl{font-size:26px;font-weight:700;color:rgba(255,255,255,.5);width:28px}
.dot{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.1);border:4px solid rgba(255,255,255,.22)}
.dot.on-b{background:var(--bgreen);border-color:#1b5e20}
.dot.on-s{background:var(--gold);border-color:#b8860b}
.dot.out{background:rgba(255,255,255,.07);border:4px solid rgba(255,255,255,.15)}
.dot.out.on{background:var(--red);border-color:#7a0000}
.bso-only{position:fixed;bottom:20px;right:20px;background:rgba(8,12,24,.70);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:16px 20px;display:flex;flex-direction:column;gap:16px;}
.diamond-only{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(8,12,24,.70);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:16px;}

/* PLAYERS */
.ov-bottom{border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:stretch}
.ov-batter{display:flex;align-items:center;gap:8px;padding:8px 14px;flex:2;border-right:1px solid rgba(255,255,255,.08)}
.ov-pitcher{display:flex;align-items:center;gap:8px;padding:8px 14px;flex:2}
.ov-ptag{font-size:14px;color:rgba(255,255,255,.3);letter-spacing:1.5px;white-space:nowrap;flex-shrink:0}
.ov-pcol{display:flex;flex-direction:column;gap:3px;overflow:hidden;flex:1}
.ov-pname{font-size:28px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-pnexts{display:flex;gap:10px;align-items:center}
.ov-pntag{font-size:16px;color:rgba(255,255,255,.25)}
.ov-pnnm{font-size:20px;color:rgba(255,255,255,.45);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.players-only{position:fixed;bottom:20px;left:20px;right:20px;background:rgba(8,12,24,.70);border:1px solid rgba(255,255,255,.1);border-radius:7px;overflow:hidden;display:flex;}

/* INNSCORE TABLE */
.ov-table-wrap{overflow:hidden;max-height:0;opacity:0;transition:max-height .55s cubic-bezier(.4,0,.2,1),opacity .4s ease;border-top:0px solid rgba(255,255,255,.08);}
.ov-table-wrap.visible{max-height:80px;opacity:1;border-top:1px solid rgba(255,255,255,.08);}
.ov-table{border-collapse:collapse;font-size:10px;width:100%;table-layout:auto}
.ov-table th{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);font-size:9px;font-weight:500;text-align:center;padding:3px 4px;border-bottom:1px solid rgba(255,255,255,.07);white-space:nowrap}
.ov-table th.tc{text-align:left;padding-left:10px}
.ov-table td{text-align:center;padding:3px 4px;color:rgba(255,255,255,.55);font-variant-numeric:tabular-nums;font-size:10px}
.ov-table td.tc{text-align:left;padding-left:10px;font-weight:700;color:#fff;white-space:nowrap}
.ov-table tr:first-child td{border-bottom:1px solid rgba(255,255,255,.07)}
.ov-table td.cur{color:#fff;font-weight:700}
.ov-table td.tot{font-weight:700;color:var(--gold);border-left:1px solid rgba(255,255,255,.1)}
.td-x{color:rgba(255,90,90,.8);margin-left:2px}
.innscore-only{position:fixed;bottom:20px;left:20px;right:20px;background:rgba(8,12,24,.70);border:1px solid rgba(255,255,255,.1);border-radius:7px;overflow:hidden;}
.innscore-only .ov-table{font-size:14px}
.innscore-only .ov-table th{font-size:12px;padding:5px 6px}
.innscore-only .ov-table td{padding:5px 6px;font-size:14px}
</style>
</head>
<body>
<script>
const params=new URLSearchParams(location.search);
const mode=params.get('show')||'all';

// hide パラメータ: カンマ区切りで非表示にする要素を指定
// 例: ?hide=inning,teams,bso,diamond,score,clock,players
const hideList=(params.get('hide')||'').split(',').map(s=>s.trim()).filter(Boolean);
const hidden=new Set(hideList);
// show パラメータで単一要素指定の場合も hide で制御
// ?show=inning → イニングのみ → 他を全部hide相当
const showOnly=params.get('show');
// 位置パラメータ: ?pos=bottom-left(デフォルト), bottom-right, top-left, top-right, bottom, top
const pos=params.get('pos')||'bottom-left';

const SCORE_HTML=`
  <div class="ov-top">
    <div class="ov-inn">
      <div class="ov-inn-arr-top" id="ov-arr-top">▲</div>
      <div class="ov-inn-num" id="ov-inn">1</div>
      <div class="ov-inn-arr-bot" id="ov-arr-bot">▼</div>
    </div>
    <div class="ov-teams">
      <div class="ov-team"><div class="ov-team-logo" id="ov-logo-away"></div><div class="ov-tname" id="ov-aname">先攻</div><div class="ov-tspacer"></div><div class="ov-tscore" id="ov-ascore">0</div></div>
      <div class="ov-team"><div class="ov-team-logo" id="ov-logo-home"></div><div class="ov-tname" id="ov-hname">後攻</div><div class="ov-tspacer"></div><div class="ov-tscore" id="ov-hscore">0</div></div>
    </div>
  </div>`;

const BSO_HTML=`
  <div class="bso-rows">
    <div class="bso-row"><span class="bso-lbl">B</span><div class="dot" id="ov-bd1"></div><div class="dot" id="ov-bd2"></div><div class="dot" id="ov-bd3"></div></div>
    <div class="bso-row"><span class="bso-lbl">S</span><div class="dot" id="ov-sd1"></div><div class="dot" id="ov-sd2"></div></div>
    <div class="bso-row"><span class="bso-lbl">O</span><div class="dot out" id="ov-od1"></div><div class="dot out" id="ov-od2"></div></div>
  </div>`;

const DIAMOND_SVG=`
  <svg width="220" height="200" viewBox="-4 -4 54 46">
    <rect x="17" y="1" width="10" height="10" transform="rotate(45 22 6)" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width="1.2" id="ov-b2"/>
    <rect x="1" y="14" width="10" height="10" transform="rotate(45 6 19)" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width="1.2" id="ov-b3"/>
    <rect x="33" y="14" width="10" height="10" transform="rotate(45 38 19)" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width="1.2" id="ov-b1"/>
  </svg>`;

const PLAYERS_HTML=`
  <div class="ov-batter">
    <span class="ov-ptag">打</span>
    <div class="ov-pcol">
      <div class="ov-pname" id="ov-batter">-</div>
      <div class="ov-pnexts"><span class="ov-pntag">次</span><span class="ov-pnnm" id="ov-bnext">-</span><span class="ov-pntag">次々</span><span class="ov-pnnm" id="ov-bnext2">-</span></div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;flex:2;border-left:1px solid rgba(255,255,255,.08)">
    <div class="ov-pitcher" style="border-bottom:1px solid rgba(255,255,255,.06)"><span class="ov-ptag">投</span><div class="ov-pname" id="ov-pitcher">-</div></div>
    <div class="ov-pitcher"><span class="ov-ptag">捕</span><div class="ov-pname" id="ov-catcher">-</div></div>
  </div>`;

const TABLE_HTML=`<div class="ov-table-wrap" id="ov-table-wrap"><table class="ov-table"><thead id="ov-thead"></thead><tbody id="ov-tbody"></tbody></table></div>`;

function posStyle(){
  const map={
    'bottom-left':'bottom:20px;left:20px;right:20px;',
    'bottom-right':'bottom:20px;right:20px;left:auto;width:calc(50% - 40px);',
    'top-left':'top:20px;left:20px;right:20px;bottom:auto;',
    'top-right':'top:20px;right:20px;left:auto;width:calc(50% - 40px);bottom:auto;',
    'bottom':'bottom:20px;left:20px;right:20px;',
    'top':'top:20px;left:20px;right:20px;bottom:auto;',
  };
  return map[pos]||map['bottom-left'];
}

function h(key){return hidden.has(key);}

function buildDOM(){
  const b=document.body;

  // ?show= 単一モード（従来互換）
  if(mode==='clock'){b.innerHTML=`<div class="clock-only" id="ov-clock">00:00:00</div>`;return;}
  if(mode==='bso'){b.innerHTML=`<div class="bso-only">${BSO_HTML}</div>`;return;}
  if(mode==='diamond'){b.innerHTML=`<div class="diamond-only">${DIAMOND_SVG}</div>`;return;}
  if(mode==='players'){b.innerHTML=`<div class="players-only">${PLAYERS_HTML}</div>`;return;}
  if(mode==='score'){
    b.innerHTML=`<div class="ov" style="${posStyle()}">
      <div class="ov-bg-img" id="ov-bg-img"></div>
      <div class="ov-clock" id="ov-clock">00:00:00<div class="ov-clock-logo" id="ov-clock-logo"></div></div>
      <div class="ov-top">
        <div class="ov-inn">
          <div class="ov-inn-arr-top" id="ov-arr-top">▲</div>
          <div class="ov-inn-num" id="ov-inn">1</div>
          <div class="ov-inn-arr-bot" id="ov-arr-bot">▼</div>
        </div>
        <div class="ov-teams">
          <div class="ov-team"><div class="ov-team-logo" id="ov-logo-away"></div><div class="ov-tname" id="ov-aname">先攻</div><div class="ov-tspacer"></div><div class="ov-tscore" id="ov-ascore">0</div></div>
          <div class="ov-team"><div class="ov-team-logo" id="ov-logo-home"></div><div class="ov-tname" id="ov-hname">後攻</div><div class="ov-tspacer"></div><div class="ov-tscore" id="ov-hscore">0</div></div>
        </div>
        <div class="ov-diamond">${DIAMOND_SVG}${BSO_HTML}</div>
      </div>
    </div>`;
    return;
  }
  if(mode==='innscore'){b.innerHTML=`<div class="innscore-only"><div class="ov-table-wrap visible"><table class="ov-table"><thead id="ov-thead"></thead><tbody id="ov-tbody"></tbody></table></div></div>`;return;}

  // all モード + hide パラメータで個別制御
  const clockPart  = h('clock')   ? '' : `<div class="ov-clock" id="ov-clock">00:00:00<div class="ov-clock-logo" id="ov-clock-logo"></div></div>`;
  const innPart    = h('inning')  ? '' : `
    <div class="ov-inn">
      <div class="ov-inn-arr-top" id="ov-arr-top">▲</div>
      <div class="ov-inn-num" id="ov-inn">1</div>
      <div class="ov-inn-arr-bot" id="ov-arr-bot">▼</div>
    </div>`;
  const teamsPart  = h('teams')   ? '' : `
    <div class="ov-teams">
      <div class="ov-team"><div class="ov-tname" id="ov-aname">先攻</div><div class="ov-tspacer"></div><div class="ov-tscore" id="ov-ascore">0</div></div>
      <div class="ov-team"><div class="ov-tname" id="ov-hname">後攻</div><div class="ov-tspacer"></div><div class="ov-tscore" id="ov-hscore">0</div></div>
    </div>`;
  const bsoPart    = h('bso')     ? '' : `<div class="bso-rows">
    <div class="bso-row"><span class="bso-lbl">B</span><div class="dot" id="ov-bd1"></div><div class="dot" id="ov-bd2"></div><div class="dot" id="ov-bd3"></div></div>
    <div class="bso-row"><span class="bso-lbl">S</span><div class="dot" id="ov-sd1"></div><div class="dot" id="ov-sd2"></div></div>
    <div class="bso-row"><span class="bso-lbl">O</span><div class="dot out" id="ov-od1"></div><div class="dot out" id="ov-od2"></div></div>
  </div>`;
  const diamondPart= h('diamond') ? '' : DIAMOND_SVG;
  const bsoDiamondPart = (h('bso')&&h('diamond')) ? '' : `
    <div class="ov-diamond">${diamondPart}${bsoPart}</div>`;
  const topRow = (!innPart&&!teamsPart&&!bsoDiamondPart) ? '' : `
    <div class="ov-top">${innPart}${teamsPart}${bsoDiamondPart}</div>`;
  const playersPart= h('players') ? '' : `<div class="ov-bottom">${PLAYERS_HTML}</div>`;
  const tablePart  = `<div class="ov-table-wrap" id="ov-table-wrap"><table class="ov-table"><thead id="ov-thead"></thead><tbody id="ov-tbody"></tbody></table></div>`;

  b.innerHTML=`<div class="ov" style="${posStyle()}"><div class="ov-bg-img" id="ov-bg-img"></div>${clockPart}${topRow}${playersPart}${tablePart}</div>`;
}

function g(id){return document.getElementById(id);}
function set(id,v){const e=g(id);if(e)e.textContent=v;}

function applyState(s){
  if(!s)return;
  const inn=s.inn||1;const isTop=s.top!==false;
  const n=Math.max(s.maxInn||7,inn);
  const asc=s.asc||[];const hsc=s.hsc||[];const xOn=s.xOn||{};
  function tsum(sc){let v=0;for(let i=0;i<n;i++){const x=sc[i];if(typeof x==='number')v+=x;}return v;}
  const at=tsum(asc),ht=tsum(hsc);

  set('ov-inn',inn);
  const at2=g('ov-arr-top');const ab=g('ov-arr-bot');
  if(at2)at2.className='ov-inn-arr-top'+(isTop?'':' inactive');
  if(ab)ab.className='ov-inn-arr-bot'+(isTop?' inactive':'');
  set('ov-aname',s.aab||'先攻');set('ov-hname',s.hnm||'後攻');
  set('ov-ascore',at);set('ov-hscore',ht);
  // チーム名を枠に合わせて縮小
  requestAnimationFrame(fitTeamNames);

  for(let i=0;i<3;i++){const d=g('ov-bd'+(i+1));if(d)d.className='dot'+(i<(s.b||0)?' on-b':'');}
  for(let i=0;i<2;i++){
    const sd=g('ov-sd'+(i+1));if(sd)sd.className='dot'+(i<(s.s||0)?' on-s':'');
    const od=g('ov-od'+(i+1));if(od)od.className='dot out'+(i<(s.o||0)?' on':'');
  }
  [1,2,3].forEach(n2=>{
    const el=g('ov-b'+n2);const r=s.r&&s.r[n2];
    if(el){el.style.fill=r?'#f5c518':'rgba(255,255,255,.08)';el.style.stroke=r?'#b8860b':'rgba(255,255,255,.25)';}
  });

  set('ov-batter',s.batter||'-');set('ov-bnext',s.batterNext||'-');
  set('ov-bnext2',s.batterNext2||'-');set('ov-pitcher',s.pitcher||'-');
  set('ov-catcher',s.catcher||'-');

  const thead=g('ov-thead');
  if(thead){let th=`<tr><th class="tc">チーム</th>`;for(let i=1;i<=n;i++)th+=`<th>${i}</th>`;th+='<th>計</th></tr>';thead.innerHTML=th;}
  const tbody=g('ov-tbody');
  if(tbody){
    let html='';
    [[s.aab||'先攻',asc,at,'away'],[s.hnm||'後攻',hsc,ht,'home']].forEach(([nm,sc,tot,team])=>{
      html+=`<tr><td class="tc">${nm}</td>`;
      for(let i=0;i<n;i++){const val=sc[i];const isCur=(i+1)===inn;const xFlag=xOn[`${team}-${i}`];const cell=val===null||val===undefined?'<span style="color:#1a1a1a">－</span>':val==='x'?'<span style="color:#555">×</span>':`${val}${xFlag?'<span class="td-x">×</span>':''}`;html+=`<td class="${isCur?'cur':''}">${cell}</td>`;}
      html+=`<td class="tot">${tot}</td></tr>`;
    });
    tbody.innerHTML=html;
  }
  if(mode==='all'){const tw=g('ov-table-wrap');if(tw)tw.className='ov-table-wrap'+(s.vis&&s.vis.ovScore?' visible':'');}
}

function updateClock(){
  const now=new Date();
  const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const e=g('ov-clock');if(e)e.textContent=t;
}

let ws=null;
function connectWS(){
  ws=new WebSocket('wss://'+location.host);
  ws.onmessage=e=>{const h=t=>{try{applyState(JSON.parse(t));}catch(err){}};if(e.data instanceof Blob)e.data.text().then(h);else h(e.data);};
  ws.onclose=()=>setTimeout(connectWS,2000);
  ws.onerror=()=>ws.close();
}

buildDOM();
window.addEventListener('resize',()=>requestAnimationFrame(fitTeamNames));

// チーム名フォントを枠に合わせて自動縮小
function fitTeamNames(){
  ['ov-aname','ov-hname'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    const parent=el.parentElement;
    if(!parent)return;
    // スコア幅を除いた利用可能幅を計算
    const score=parent.querySelector('.ov-tscore');
    const scoreW=score?score.offsetWidth:0;
    const available=parent.offsetWidth-scoreW-20; // 20px余白
    if(available<=0)return;
    // フォントサイズをリセット
    el.style.fontSize='90px';
    // はみ出ていたら縮小
    let fs=90;
    while(el.scrollWidth>available&&fs>14){
      fs-=2;
      el.style.fontSize=fs+'px';
    }
  });

function loadLogos(){
  // チームロゴ
  ['away','home'].forEach(t=>{
    const data=localStorage.getItem('bb_logo_'+t);
    const el=document.getElementById('ov-logo-'+t);
    if(el&&data)el.style.backgroundImage=`url(${data})`;
  });
  // 全体背景画像
  const bgData=localStorage.getItem('bb_logo_bg');
  const bgEl=document.getElementById('ov-bg-img');
  if(bgEl&&bgData)bgEl.style.backgroundImage=`url(${bgData})`;
  // 時計ロゴ
  const clkData=localStorage.getItem('bb_logo_clock');
  const clkEl=document.getElementById('ov-clock-logo');
  if(clkEl&&clkData)clkEl.style.backgroundImage=`url(${clkData})`;
}
loadLogos();

// ロゴアップロードUI（?show=logosetup のときだけ表示）
if(mode==='logosetup'){
  document.body.innerHTML=`
  <div style="position:fixed;inset:0;background:#111;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;font-family:sans-serif;padding:20px">
    <h2 style="font-size:20px;color:#f5c518">チームロゴ設定</h2>
    <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px">
      <label style="font-size:13px;color:#aaa">先攻チーム画像</label>
      <input type="file" accept="image/*" onchange="uploadLogo('away',this)" style="color:#fff">
      <div id="preview-away" style="height:80px;background:rgba(255,255,255,.05);border-radius:8px;background-size:contain;background-repeat:no-repeat;background-position:center"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px">
      <label style="font-size:13px;color:#aaa">後攻チーム画像</label>
      <input type="file" accept="image/*" onchange="uploadLogo('home',this)" style="color:#fff">
      <div id="preview-home" style="height:80px;background:rgba(255,255,255,.05);border-radius:8px;background-size:contain;background-repeat:no-repeat;background-position:center"></div>
    </div>
    <p style="font-size:11px;color:#555;text-align:center">画像はこのデバイスに保存されます。<br>overlay.html?show=score で表示されます。</p>
  </div>`;
}
function uploadLogo(team,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{localStorage.setItem('bb_logo_'+team,e.target.result);}catch(err){alert('画像が大きすぎます。小さい画像を使ってください。');}
    const prev=document.getElementById('preview-'+team);
    if(prev)prev.style.backgroundImage=`url(${e.target.result})`;
  };
  reader.readAsDataURL(file);
}
updateClock();
setInterval(updateClock,1000);
connectWS();
</script>
