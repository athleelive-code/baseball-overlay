<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Overlay Output</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
:root{--red:#c8102e;--gold:#f5c518;--green:#2e7d32;--bgreen:#43a047}
html,body{background:transparent;width:100%;height:100%;overflow:hidden}

.ov{
  position:fixed;bottom:20px;left:20px;right:20px;
  background:rgba(8,12,24,.93);
  border:1px solid rgba(255,255,255,.1);
  border-radius:7px;
  overflow:hidden;
  display:flex;flex-direction:column;
}

/* ── INNING ── */
.ov-top{display:flex;align-items:stretch}
.ov-inn{
  background:var(--red);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 20px;min-width:90px;gap:2px;flex-shrink:0
}
.ov-inn-arr-top{font-size:44px;font-weight:900;color:rgba(255,255,255,.95);line-height:1;transition:opacity .15s}
.ov-inn-arr-top.inactive{opacity:.2}
.ov-inn-num{font-size:64px;font-weight:700;color:#fff;line-height:1;margin:4px 0}
.ov-inn-arr-bot{font-size:44px;font-weight:900;color:rgba(255,255,255,.95);line-height:1;transition:opacity .15s}
.ov-inn-arr-bot.inactive{opacity:.2}

/* ── TEAMS ── */
.ov-teams{flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.1)}
.ov-team{display:flex;align-items:center;padding:6px 14px;gap:0;flex:1}
.ov-team:first-child{border-bottom:1px solid rgba(255,255,255,.08)}
.ov-tname{font-size:30px;font-weight:700;color:#fff;white-space:nowrap;padding-right:1em;flex-shrink:0}
.ov-tspacer{flex:1}
.ov-tscore{font-size:56px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;flex-shrink:0}

/* ── DIAMOND + BSO ── */
.ov-diamond{
  border-left:1px solid rgba(255,255,255,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;
  padding:8px 16px;min-width:200px;gap:8px;
  transition:max-width .5s ease,opacity .4s ease,padding .5s ease;
  overflow:hidden;
  max-width:300px;
}
.ov-diamond.hidden{max-width:0;opacity:0;padding:0;border:none}

/* BSO 行間を広げる */
.bso-rows{display:flex;flex-direction:column;gap:10px}
.bso-row{display:flex;gap:8px;align-items:center}
.bso-lbl{font-size:14px;font-weight:700;color:rgba(255,255,255,.5);width:16px}
.dot{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.22)}
.dot.on-b{background:var(--bgreen);border-color:#1b5e20}
.dot.on-s{background:var(--gold);border-color:#b8860b}
.dot.out{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15)}
.dot.out.on{background:var(--red);border-color:#7a0000}

/* ── PLAYER ROW ── */
.ov-bottom{border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:stretch}
.ov-batter{display:flex;align-items:center;gap:8px;padding:8px 14px;flex:2;border-right:1px solid rgba(255,255,255,.08)}
.ov-pitcher{display:flex;align-items:center;gap:8px;padding:8px 14px;flex:2}
.ov-ptag{font-size:14px;color:rgba(255,255,255,.3);letter-spacing:1.5px;white-space:nowrap;flex-shrink:0}
.ov-pcol{display:flex;flex-direction:column;gap:3px;overflow:hidden;flex:1}
.ov-pname{font-size:28px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-pnexts{display:flex;gap:10px;align-items:center}
.ov-pntag{font-size:16px;color:rgba(255,255,255,.25)}
.ov-pnnm{font-size:20px;color:rgba(255,255,255,.45);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── SCORE TABLE: アニメーションで伸びて表示 ── */
.ov-table-wrap{
  overflow:hidden;
  max-height:0;opacity:0;
  transition:max-height .55s cubic-bezier(.4,0,.2,1),opacity .4s ease;
  border-top:0px solid rgba(255,255,255,.08);
}
.ov-table-wrap.visible{
  max-height:80px;opacity:1;
  border-top:1px solid rgba(255,255,255,.08);
}
.ov-table{border-collapse:collapse;font-size:10px;width:100%;table-layout:auto}
.ov-table th{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);font-size:9px;font-weight:500;text-align:center;padding:3px 4px;border-bottom:1px solid rgba(255,255,255,.07);white-space:nowrap}
.ov-table th.tc{text-align:left;padding-left:10px}
.ov-table td{text-align:center;padding:3px 4px;color:rgba(255,255,255,.55);font-variant-numeric:tabular-nums;font-size:10px}
.ov-table td.tc{text-align:left;padding-left:10px;font-weight:700;color:#fff;white-space:nowrap}
.ov-table tr:first-child td{border-bottom:1px solid rgba(255,255,255,.07)}
.ov-table td.cur{color:#fff;font-weight:700}
.ov-table td.tot{font-weight:700;color:var(--gold);border-left:1px solid rgba(255,255,255,.1)}
.td-x{color:rgba(255,90,90,.8);margin-left:2px}
</style>
</head>
<body>

<div class="ov" id="ov">
  <div class="ov-top">
    <!-- イニング: ▲/回数/▼、▲▼は倍サイズ、現在の表/裏で片方を強調 -->
    <div class="ov-inn">
      <div class="ov-inn-arr-top" id="ov-arr-top">▲</div>
      <div class="ov-inn-num" id="ov-inn">1</div>
      <div class="ov-inn-arr-bot" id="ov-arr-bot">▼</div>
    </div>
    <div class="ov-teams">
      <div class="ov-team">
        <div class="ov-tname" id="ov-aname">先攻</div>
        <div class="ov-tspacer"></div>
        <div class="ov-tscore" id="ov-ascore">0</div>
      </div>
      <div class="ov-team">
        <div class="ov-tname" id="ov-hname">後攻</div>
        <div class="ov-tspacer"></div>
        <div class="ov-tscore" id="ov-hscore">0</div>
      </div>
    </div>
    <!-- ダイヤモンド + BSO -->
    <div class="ov-diamond" id="ov-diamond">
      <!-- viewBox を広げて3塁が欠けないよう調整 -->
      <svg width="110" height="100" viewBox="-4 -4 54 46">
        <rect x="17" y="1" width="10" height="10" transform="rotate(45 22 6)"  fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width="1.2" id="ov-b2"/>
        <rect x="1"  y="14" width="10" height="10" transform="rotate(45 6 19)"  fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width="1.2" id="ov-b3"/>
        <rect x="33" y="14" width="10" height="10" transform="rotate(45 38 19)" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)" stroke-width="1.2" id="ov-b1"/>
      </svg>
      <div class="bso-rows">
        <div class="bso-row"><span class="bso-lbl">B</span><div class="dot" id="ov-bd1"></div><div class="dot" id="ov-bd2"></div><div class="dot" id="ov-bd3"></div></div>
        <div class="bso-row"><span class="bso-lbl">S</span><div class="dot" id="ov-sd1"></div><div class="dot" id="ov-sd2"></div></div>
        <div class="bso-row"><span class="bso-lbl">O</span><div class="dot out" id="ov-od1"></div><div class="dot out" id="ov-od2"></div></div>
      </div>
    </div>
  </div>

  <div class="ov-bottom">
    <div class="ov-batter">
      <span class="ov-ptag">打</span>
      <div class="ov-pcol">
        <div class="ov-pname" id="ov-batter">-</div>
        <div class="ov-pnexts">
          <span class="ov-pntag">次</span><span class="ov-pnnm" id="ov-bnext">-</span>
          <span class="ov-pntag">次々</span><span class="ov-pnnm" id="ov-bnext2">-</span>
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;flex:2;border-left:1px solid rgba(255,255,255,.08)">
      <div class="ov-pitcher" style="border-bottom:1px solid rgba(255,255,255,.06)">
        <span class="ov-ptag">投</span>
        <div class="ov-pname" id="ov-pitcher">-</div>
      </div>
      <div class="ov-pitcher">
        <span class="ov-ptag">捕</span>
        <div class="ov-pname" id="ov-catcher">-</div>
      </div>
    </div>
  </div>

  <!-- スコア表: 操作側のmaxInnに合わせて動的生成 -->
  <div class="ov-table-wrap" id="ov-table-wrap">
    <table class="ov-table">
      <thead id="ov-thead"></thead>
      <tbody id="ov-tbody"></tbody>
    </table>
  </div>
</div>

<script>
function applyState(s){
  if(!s)return;
  const inn=s.inn||1;
  const isTop=s.top!==false;
  const n=Math.max(s.maxInn||7,inn);

  // ── イニング: ▲ が表で強調、▼ が裏で強調
  document.getElementById('ov-inn').textContent=inn;
  const arrTop=document.getElementById('ov-arr-top');
  const arrBot=document.getElementById('ov-arr-bot');
  arrTop.className='ov-inn-arr-top'+(isTop?'':' inactive');
  arrBot.className='ov-inn-arr-bot'+(isTop?' inactive':'');

  // ── チーム名・スコア
  document.getElementById('ov-aname').textContent=s.aab||'先攻';
  document.getElementById('ov-hname').textContent=s.hnm||'後攻';
  const asc=s.asc||[];const hsc=s.hsc||[];const xOn=s.xOn||{};
  function tsum(sc){let v=0;for(let i=0;i<n;i++){const x=sc[i];if(typeof x==='number')v+=x;}return v;}
  const at=tsum(asc),ht=tsum(hsc);
  document.getElementById('ov-ascore').textContent=at;
  document.getElementById('ov-hscore').textContent=ht;

  // ── BSO
  for(let i=0;i<3;i++){const d=document.getElementById('ov-bd'+(i+1));if(d)d.className='dot'+(i<(s.b||0)?' on-b':'');}
  for(let i=0;i<2;i++){
    const sd=document.getElementById('ov-sd'+(i+1));if(sd)sd.className='dot'+(i<(s.s||0)?' on-s':'');
    const od=document.getElementById('ov-od'+(i+1));if(od)od.className='dot out'+(i<(s.o||0)?' on':'');
  }
  [1,2,3].forEach(n2=>{
    const el=document.getElementById('ov-b'+n2);const r=s.r&&s.r[n2];
    if(el){el.style.fill=r?'#f5c518':'rgba(255,255,255,.08)';el.style.stroke=r?'#b8860b':'rgba(255,255,255,.25)';}
  });

  // ── 打者・投手
  document.getElementById('ov-batter').textContent=s.batter||'-';
  document.getElementById('ov-bnext').textContent=s.batterNext||'-';
  document.getElementById('ov-bnext2').textContent=s.batterNext2||'-';
  document.getElementById('ov-pitcher').textContent=s.pitcher||'-';
  document.getElementById('ov-catcher').textContent=s.catcher||'-';

  // ── スコア表: maxInn に合わせて列を動的生成
  const thead=document.getElementById('ov-thead');
  let thHtml='<tr><th class="tc">チーム</th>';
  for(let i=1;i<=n;i++)thHtml+=`<th>${i}</th>`;
  thHtml+='<th>計</th></tr>';
  thead.innerHTML=thHtml;

  let html='';
  [[s.aab||'先攻',asc,at,'away'],[s.hnm||'後攻',hsc,ht,'home']].forEach(([nm,sc,tot,team])=>{
    html+=`<tr><td class="tc">${nm}</td>`;
    for(let i=0;i<n;i++){
      const val=sc[i];const isCur=(i+1)===inn;
      const key=`${team}-${i}`;const xFlag=xOn[key];
      let cell='';
      if(val===null||val===undefined)cell='<span style="color:#1a1a1a">－</span>';
      else if(val==='x')cell='<span style="color:#555">×</span>';
      else cell=`${val}${xFlag?'<span class="td-x">×</span>':''}`;
      html+=`<td class="${isCur?'cur':''}">${cell}</td>`;
    }
    html+=`<td class="tot">${tot}</td></tr>`;
  });
  document.getElementById('ov-tbody').innerHTML=html;

  // ── スコア表示/非表示: 表示時はBSO/diamondを消しアニメで伸びる
  const showScore = !(s.vis && s.vis.score === false);
  const tw = document.getElementById('ov-table-wrap');
  const dm = document.getElementById('ov-diamond');
  if(tw) tw.className = 'ov-table-wrap' + (showScore ? ' visible' : '');
  if(dm) dm.className = 'ov-diamond' + (showScore ? ' hidden' : '');
}

let ws=null;
function connectWS(){
  const wsUrl='wss://'+location.host;
  ws=new WebSocket(wsUrl);
  ws.onopen=()=>console.log('overlay WS connected');
  ws.onmessage=e=>{
    const handle=(text)=>{
      try{applyState(JSON.parse(text));}catch(err){console.error('parse error',err);}
    };
    if(e.data instanceof Blob){
      e.data.text().then(handle);
    } else {
      handle(e.data);
    }
  };
  ws.onclose=()=>{setTimeout(connectWS,2000);};
  ws.onerror=()=>ws.close();
}
connectWS();
</script>
</body>
</html>
