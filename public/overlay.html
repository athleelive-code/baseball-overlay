<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Overlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
:root{--red:#c8102e;--gold:#f5c518;--bgreen:#43a047;--dg:#1b5e20}
html,body{background:transparent;width:100%;height:100%;overflow:hidden}

/* ── OVERLAY CONTAINER ── */
.ov{
  position:fixed;
  right:20px;bottom:20px;
  background:rgba(8,12,24,.80);
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;overflow:hidden;
  display:inline-flex;flex-direction:column;
  width:calc(33% - 20px);
}

/* ── TOP BAR ── */
.ov-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 10px;background:rgba(0,0,0,.4);
  border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;
}
.ov-brand{font-size:clamp(11px,2vw,16px);font-weight:800;color:#c8102e;letter-spacing:.5px}
.ov-brand span{color:#fff}
.ov-topbar-inn{font-size:clamp(11px,2vw,15px);font-weight:700;color:rgba(255,255,255,.7);letter-spacing:1px}
.ov-clock{font-size:clamp(11px,2vw,15px);font-weight:600;color:rgba(255,255,255,.7);font-variant-numeric:tabular-nums;letter-spacing:.5px;will-change:contents}
.ov-top{display:flex;align-items:stretch}

/* イニング */
.ov-inn{
  background:rgba(200,16,46,.85);
  display:flex;align-items:center;justify-content:center;
  padding:6px 10px;flex-shrink:0;
}
.ov-inn-num{font-size:clamp(36px,7vw,60px);font-weight:700;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
.ov-inn-row{display:flex;align-items:center;gap:4px}
.ov-inn-tb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.ov-inn-tb span{font-size:clamp(11px,2.5vw,16px);font-weight:700;color:rgba(255,255,255,.28);line-height:1}
.ov-inn-tb span.active{color:#fff}

/* チーム名（水平パディング最小） */
.ov-teams{display:flex;flex-direction:column;flex-shrink:0;border-left:1px solid rgba(255,255,255,.1)}
.ov-team-row{display:flex;align-items:center;padding:6px 14px;gap:10px;flex:1}
.ov-team-row:first-child{border-bottom:1px solid rgba(255,255,255,.08)}
.ov-team-ind{width:12px;border-radius:2px;align-self:stretch;margin:4px 0;background:rgba(255,255,255,.1);flex-shrink:0}
.ov-team-ind.active{background:var(--red)}
.ov-team-name{font-size:clamp(22px,4.5vw,40px);font-weight:700;color:#fff;white-space:nowrap;line-height:1}

/* イニングスコア表（右詰め・数字幅のみ使用） */
.ov-ist-inline{
  flex:1;overflow:hidden;border-left:1px solid rgba(255,255,255,.1);
  align-self:stretch;
}
.ov-ist-table{border-collapse:collapse;table-layout:fixed;width:100%;height:100%}
.ov-ist-table tr{height:50%}
.ov-ist-table td{
  text-align:center;padding:0;
  font-size:clamp(12px,2.5vw,22px);font-weight:700;
  color:rgba(255,255,255,.4);font-variant-numeric:tabular-nums;
  vertical-align:middle;white-space:nowrap;
  border-right:1px solid rgba(255,255,255,.06);
}
.ov-ist-table tr:first-child td{border-bottom:1px solid rgba(255,255,255,.06)}
.ov-ist-table td:last-child{border-right:none}
.ov-ist-table td.cur{color:#fff}
.ov-ist{display:none}

/* 合計得点（パディング最小） */
.ov-scores{display:flex;flex-direction:column;flex-shrink:0;border-left:1px solid rgba(255,255,255,.1)}
.ov-score-cell{display:flex;align-items:center;justify-content:flex-end;flex:1;padding:6px 10px}
.ov-score-cell:first-child{border-bottom:1px solid rgba(255,255,255,.08)}
.ov-score-num{font-size:clamp(22px,4.5vw,40px);font-weight:700;color:#fff;font-variant-numeric:tabular-nums;line-height:1}

/* BOTTOM ROW */
.ov-bot{display:flex;align-items:stretch;border-top:1px solid rgba(255,255,255,.08)}

/* BSO（余白なし） */
.ov-bso{display:flex;flex-direction:column;justify-content:space-evenly;padding:4px 8px 4px;flex-shrink:0;gap:2px;border-right:1px solid rgba(255,255,255,.08)}
.ov-bso-line{display:flex;align-items:center;gap:2px}

/* ダイヤモンド */
.ov-diamond{flex:1;display:flex;align-items:center;justify-content:center;padding:8px}
.ov-diamond svg{width:clamp(60px,14vw,90px)}

/* 打者・投手 */
.ov-players{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;padding:6px 10px;border-left:1px solid rgba(255,255,255,.08)}
.ov-player-row{display:flex;align-items:center;gap:6px;overflow:hidden}
.ov-player-tag{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1.5px;flex-shrink:0}
.ov-player-name{font-size:clamp(11px,2.8vw,16px);font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="ov" id="ov">

  <!-- TOP BAR -->
  <div class="ov-topbar">
    <span class="ov-brand">Athlee<span>Live</span></span>
    <span class="ov-clock" id="ov-clock"></span>
  </div>

  <!-- TOP ROW -->
  <div class="ov-top">
    <!-- イニング -->
    <div class="ov-inn">
      <div class="ov-inn-row">
        <div class="ov-inn-num" id="ov-inn">1</div>
        <div class="ov-inn-tb">
          <span id="ov-tb-top" class="active">▲</span>
          <span id="ov-tb-bot">▼</span>
        </div>
      </div>
    </div>
    <!-- チーム名 -->
    <div class="ov-teams">
      <div class="ov-team-row"><div class="ov-team-ind active" id="ov-ind-away"></div><div class="ov-team-name" id="ov-aname">先攻</div></div>
      <div class="ov-team-row"><div class="ov-team-ind" id="ov-ind-home"></div><div class="ov-team-name" id="ov-hname">後攻</div></div>
    </div>
    <!-- イニングスコア（チーム名と得点の間） -->
    <div class="ov-ist-inline">
      <table class="ov-ist-table"><thead></thead><tbody id="ov-ist-body"></tbody></table>
    </div>
    <!-- 合計得点（右端） -->
    <div class="ov-scores" style="margin-left:auto">
      <div class="ov-score-cell"><div class="ov-score-num" id="ov-score-away">0</div></div>
      <div class="ov-score-cell"><div class="ov-score-num" id="ov-score-home">0</div></div>
    </div>
  </div>

  <!-- BOTTOM ROW -->
  <div class="ov-bot">

    <!-- BSO -->
    <div class="ov-bso">
      <div class="ov-bso-line">
        <svg width="102" height="28" viewBox="0 0 66 20" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="#333" id="ov-bd1"/>
          <circle cx="33" cy="10" r="9" fill="#333" id="ov-bd2"/>
          <circle cx="56" cy="10" r="9" fill="#333" id="ov-bd3"/>
        </svg>
      </div>
      <div class="ov-bso-line">
        <svg width="102" height="28" viewBox="0 0 66 20" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="#333" id="ov-sd1"/>
          <circle cx="33" cy="10" r="9" fill="#333" id="ov-sd2"/>
        </svg>
      </div>
      <div class="ov-bso-line">
        <svg width="102" height="28" viewBox="0 0 66 20" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="#282828" stroke="#444" stroke-width="1.5" id="ov-od1"/>
          <circle cx="33" cy="10" r="9" fill="#282828" stroke="#444" stroke-width="1.5" id="ov-od2"/>
        </svg>
      </div>
    </div>

    <!-- ダイヤモンド（等角投影・横長）+ 投手捕手 -->
    <div style="flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.08)">
      <div style="display:flex;align-items:center;justify-content:center;padding:5px 8px">
        <svg viewBox="-10 -8 180 72" xmlns="http://www.w3.org/2000/svg" style="width:clamp(110px,28vw,170px)">
          <line x1="80" y1="5"  x2="22" y2="28" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
          <line x1="80" y1="5"  x2="138" y2="28" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
          <line x1="22" y1="28" x2="80" y2="51" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
          <line x1="138" y1="28" x2="80" y2="51" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
          <!-- 2塁（奥） -->
          <polygon id="ov-b2" points="80,-3 96,5 80,13 64,5" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
          <!-- 3塁（左） -->
          <polygon id="ov-b3" points="10,21 26,29 10,37 -6,29" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
          <!-- 1塁（右） -->
          <polygon id="ov-b1" points="150,21 166,29 150,37 134,29" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
          <!-- ホームベース -->
          <polygon points="80,59 93,51 93,43 67,43 67,51" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
        </svg>
      </div>
      <div style="display:flex;border-top:1px solid rgba(255,255,255,.06)">
        <div style="flex:1;display:flex;align-items:center;gap:5px;padding:3px 8px;border-right:1px solid rgba(255,255,255,.06)">
          <span style="font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1.5px;flex-shrink:0">P</span>
          <span style="font-size:11px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="ov-pitcher">-</span>
        </div>
        <div style="flex:1;display:flex;align-items:center;gap:5px;padding:3px 8px">
          <span style="font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1.5px;flex-shrink:0">C</span>
          <span style="font-size:11px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="ov-catcher">-</span>
        </div>
      </div>
    </div>

    <!-- 打者 -->
    <div class="ov-players" style="border-left:1px solid rgba(255,255,255,.08)">
      <div class="ov-player-row"><span class="ov-player-tag">B</span><span class="ov-player-name" id="ov-batter">-</span></div>
      <div style="display:flex;flex-direction:column;gap:2px;padding:0 0 4px 0">
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:7px;color:rgba(255,255,255,.2);letter-spacing:1px;flex-shrink:0">NEXT</span>
          <span style="font-size:10px;color:rgba(255,255,255,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="ov-batter-next">-</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:7px;color:rgba(255,255,255,.15);letter-spacing:1px;flex-shrink:0">ON DECK</span>
          <span style="font-size:10px;color:rgba(255,255,255,.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="ov-batter-next2">-</span>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
function g(id){return document.getElementById(id)}
function set(id,v){const e=g(id);if(e&&e.textContent!==String(v))e.textContent=String(v);}
function setAttr(id,attr,v){const e=g(id);if(e&&e.getAttribute(attr)!==v)e.setAttribute(attr,v);}
function setCls(id,v){const e=g(id);if(e&&e.className!==v)e.className=v;}

let _lastState=null;

function applyState(s){
  if(!s)return;

  const inn=s.inn||1, isTop=s.top!==false;
  const n=Math.max(s.maxInn||7,inn);
  const asc=s.asc||[], hsc=s.hsc||[];
  const xOn=s.xOn||{};
  const r=s.r||{};

  // イニング・表裏
  set('ov-inn',inn);
  setCls('ov-tb-top',isTop?'active':'');
  setCls('ov-tb-bot',!isTop?'active':'');

  // チーム名・インジケーター
  set('ov-aname',s.aab||'先攻');
  set('ov-hname',s.hnm||'後攻');
  setCls('ov-ind-away','ov-team-ind'+(isTop?' active':''));
  setCls('ov-ind-home','ov-team-ind'+(!isTop?' active':''));

  // 合計得点
  const at=asc.filter(x=>typeof x==='number').reduce((a,b)=>a+b,0);
  const ht=hsc.filter(x=>typeof x==='number').reduce((a,b)=>a+b,0);
  set('ov-score-away',at);
  set('ov-score-home',ht);

  // イニングスコア表
  const istBody=g('ov-ist-body');
  if(istBody){
    let html='';
    [[asc,'away'],[hsc,'home']].forEach(([sc,team])=>{
      html+='<tr>';
      for(let i=0;i<n;i++){
        const isCur=i+1===inn;
        const val=sc[i];
        const disp=val===null?'&nbsp;':val==='x'?'×':String(val);
        html+=`<td class="${isCur?'cur':''}">${disp}</td>`;
      }
      html+='</tr>';
    });
    if(istBody._lastHtml!==html){ istBody.innerHTML=html; istBody._lastHtml=html; }
  }

  // BSO
  for(let i=0;i<3;i++) setAttr('ov-bd'+(i+1),'fill',i<(s.b||0)?'#43a047':'#333');
  for(let i=0;i<2;i++){
    setAttr('ov-sd'+(i+1),'fill',i<(s.s||0)?'#f5c518':'#333');
    setAttr('ov-od'+(i+1),'fill',i<(s.o||0)?'#c8102e':'#282828');
    setAttr('ov-od'+(i+1),'stroke',i<(s.o||0)?'#7a0000':'#444');
  }

  // ダイヤモンド
  [1,2,3].forEach(n=>{
    const e=g('ov-b'+n);
    if(!e)return;
    const f=r[n]?'#f5c518':'rgba(255,255,255,.12)';
    const st2=r[n]?'#b8860b':'rgba(255,255,255,.3)';
    if(e.getAttribute('fill')!==f) e.setAttribute('fill',f);
    if(e.getAttribute('stroke')!==st2) e.setAttribute('stroke',st2);
  });

  // 打者・投手・捕手
  set('ov-batter',s.batter||'-');
  set('ov-batter-next',s.batterNext||'-');
  set('ov-batter-next2',s.batterNext2||'-');
  set('ov-pitcher',s.pitcher||'-');
  set('ov-catcher',s.catcher||'-');
}

// 時計（独立レイヤーで他要素の再描画を防ぐ）
(function tick(){
  const e=document.getElementById('ov-clock');
  if(e){
    const n=new Date();
    const t=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');
    if(e.textContent!==t) e.textContent=t;
  }
  setTimeout(tick,1000);
})();

// WebSocket
let ws=null, _wsTimer=null;
function connectWS(){
  if(_wsTimer){clearTimeout(_wsTimer);_wsTimer=null;}
  try{
    ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);
    ws.onopen=()=>{};
    ws.onmessage=e=>{
      const h=t=>{try{applyState(JSON.parse(t));}catch(err){}};
      if(e.data instanceof Blob)e.data.text().then(h);else h(e.data);
    };
    ws.onclose=()=>{ ws=null; _wsTimer=setTimeout(connectWS,3000); };
    ws.onerror=()=>{ try{ws.close();}catch(e){} };
  }catch(e){ _wsTimer=setTimeout(connectWS,3000); }
}
connectWS();
</script>
</body>
</html>
