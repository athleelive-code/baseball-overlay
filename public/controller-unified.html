<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseball Controller</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
:root{--red:#c8102e;--gold:#f5c518;--green:#2e7d32;--bgreen:#43a047}
html,body{width:100%;min-height:100%;background:#111;color:#fff;overflow-x:hidden;overflow-y:auto}

/* ── TOP BAR ── */
.top-bar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  background:#0a0a0a;border-bottom:1px solid #1a1a1a;
  padding:0 14px;min-height:52px;
}
.top-brand{
  font-size:20px;font-weight:800;letter-spacing:.5px;
  color:var(--red);
}
.top-brand span{color:#fff}
.top-gear{
  background:none;border:none;color:#888;
  font-size:28px;line-height:1;cursor:pointer;padding:4px;
}
/* ── INNING AREA ── */
.inning-area{
  display:flex;align-items:stretch;
  background:#000;border-bottom:1px solid #1a1a1a;
  min-height:100px;
}

/* 左: イニング */
.inn-block{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 14px;border-right:1px solid #1a1a1a;flex-shrink:0;gap:2px;
  background:#000;
}
.inn-top-row{display:flex;align-items:center;gap:8px}
.inn-tb{
  font-size:clamp(14px,4vw,22px);font-weight:700;
  color:rgba(255,255,255,.3);line-height:1;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.inn-tb span.active{color:#fff}
.inn-num{
  font-size:clamp(40px,13vw,72px);font-weight:700;color:#fff;
  font-variant-numeric:tabular-nums;line-height:1;
}
.inn-adj{display:flex;gap:6px;margin-top:4px}
.inn-adj-btn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;
  color:#fff;font-size:14px;font-weight:700;
  padding:3px 10px;cursor:pointer;
}
.inn-adj-btn:active{background:rgba(255,255,255,.25)}

/* 中: チーム名 + インジケーター */
.teams-block{
  display:flex;flex-direction:column;flex:1;
  border-right:1px solid #1a1a1a;
}
.team-row{
  display:flex;align-items:center;flex:1;
  padding:6px 12px;gap:10px;cursor:pointer;
}
.team-row:first-child{border-bottom:1px solid #1a1a1a}
.team-row:active{background:rgba(255,255,255,.04)}
.team-ind{
  width:15px;border-radius:3px;align-self:stretch;
  background:#222;transition:background .15s;flex-shrink:0;
}
.team-ind.active{background:var(--red)}
.team-name-disp{
  color:#fff;font-size:clamp(16px,5vw,26px);font-weight:700;
  width:100%;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  cursor:pointer;
}
.team-name-in{
  background:rgba(255,255,255,.1);border:none;border-bottom:2px solid var(--red);
  outline:none;color:#fff;font-size:clamp(16px,5vw,26px);font-weight:700;
  width:100%;min-width:0;padding:2px 4px;border-radius:3px 3px 0 0;
}

/* ── DRAWER ── */
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400}
.drawer-bg.open{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;background:#1c1c1e;border-top:1px solid #333;border-radius:16px 16px 0 0;padding:14px 16px 36px;transform:translateY(100%);transition:transform .3s;z-index:401;max-height:80vh;overflow-y:auto}
.drawer.open{transform:translateY(0)}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.drawer-ttl{font-size:13px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase}
.drawer-x{background:none;border:none;color:#888;font-size:22px;cursor:pointer;line-height:1}
.drawer-sec{margin-bottom:20px}
.drawer-sec-t{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.drawer-btn{width:100%;background:#2c2c2e;border:1px solid #444;border-radius:10px;color:#fff;font-size:14px;font-weight:600;padding:12px;cursor:pointer;text-align:center}
.drawer-btn:active{background:#3a3a3c}
.drawer-btn.danger{background:#7a0000;border-color:#c8102e;color:#fff}
.drawer-btn.danger-confirm{background:#c8102e;border-color:#ff4444;color:#fff}

/* ── SCORE INPUT PANEL ── */
.sc-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center}
.sc-bg.open{display:flex}
.sc-sheet{
  background:rgba(28,28,30,.97);border:1px solid rgba(255,255,255,.12);
  border-radius:18px;padding:16px 18px 20px;
  display:flex;flex-direction:column;gap:12px;
  min-width:260px;max-width:340px;width:88vw;
}
.sc-hdr{display:flex;align-items:center;justify-content:space-between}
.sc-title{font-size:12px;font-weight:600;color:#888;letter-spacing:1px}
.sc-close-x{background:rgba(255,255,255,.12);border:none;color:#ccc;font-size:16px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sc-display{
  display:flex;align-items:center;justify-content:center;gap:10px;
  min-height:60px;font-size:clamp(44px,12vw,64px);font-weight:700;
  font-variant-numeric:tabular-nums;line-height:1;
}
.sc-num{color:#fff}
.sc-x-disp{color:rgba(255,90,90,.8);font-size:.6em}
.sc-blank{color:#333;font-size:clamp(28px,8vw,40px)}
.sc-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sc-btn{
  border:none;border-radius:12px;
  font-size:clamp(22px,7vw,34px);font-weight:700;
  padding:14px 4px;cursor:pointer;line-height:1;
  background:rgba(60,60,65,.9);color:#fff;
}
.sc-btn:active{transform:scale(.92)}
.sc-btn-x{background:rgba(60,60,65,.9);color:#fff}
.sc-btn-x.active{background:rgba(200,16,46,.35);border:2px solid rgba(200,16,46,.6)}
.sc-done{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:12px;color:#ccc;font-size:15px;font-weight:500;
  padding:13px;cursor:pointer;width:100%;text-align:center;
}
.sc-done:active{background:rgba(255,255,255,.2)}
.field-row{
  display:flex;align-items:stretch;
  background:#0a0a0a;border-bottom:1px solid #1a1a1a;
}
.diamond-block{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 8px;border-right:1px solid #1a1a1a;gap:0;overflow:hidden;
}
.diamond-block svg{pointer-events:all;width:100%;max-width:200px}
.diamond-block svg rect:not(.tap-area):not(#minus-btn){pointer-events:none}
.diamond-block svg circle:not(#runner-drag):not(#runner1):not(#runner2):not(#runner3){pointer-events:none}
.diamond-block svg text{pointer-events:none}
.diamond-block svg polygon{pointer-events:all}
#minus-btn{pointer-events:all}
.bso-block{
  flex:1;display:flex;flex-direction:column;justify-content:stretch;
  padding:8px 12px;gap:0;border-right:1px solid #1a1a1a;
}
.bso-line{
  display:flex;align-items:center;gap:10px;flex:1;
  cursor:pointer;border-radius:8px;padding:4px 6px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.bso-line:active{background:rgba(255,255,255,.05)}
.bso-lbl{font-size:clamp(22px,6.5vw,34px);font-weight:700;color:#ccc;width:34px;flex-shrink:0;pointer-events:none}
.bso-dots{display:flex;gap:8px;pointer-events:none}
.bdot{border-radius:50%;background:#333;border:2px solid #555;width:clamp(36px,10vw,52px);height:clamp(36px,10vw,52px);flex-shrink:0}
.bdot.on-b{background:#43a047;border-color:#1b5e20}
.bdot.on-s{background:#f5c518;border-color:#b8860b}
.bdot.out{background:#282828;border:2px solid #444}
.bdot.out.on{background:#c8102e;border-color:#7a0000}
.bso-c{background:#2a2a2a;border:1px solid #555;border-radius:7px;color:#aaa;font-size:12px;font-weight:700;padding:4px 9px;cursor:pointer;flex-shrink:0;margin-left:auto}
.bso-c:active{background:#555}

/* ── BATTERY ROW ── */
.battery-row{
  display:flex;align-items:stretch;
  background:#0a0a0a;border-bottom:1px solid #1a1a1a;
  min-height:52px;
}
.battery-cell{
  flex:1;display:flex;align-items:center;gap:8px;
  padding:8px 12px;
}
.battery-cell:first-child{border-right:none}
.battery-tag{
  font-size:10px;color:#555;letter-spacing:1.5px;
  font-weight:600;flex-shrink:0;
}
.battery-sel{
  background:transparent;border:none;outline:none;
  color:#fff;font-size:clamp(14px,4vw,18px);font-weight:500;
  width:100%;-webkit-appearance:none;cursor:pointer;
}
.battery-sel option{color:#111;background:#fff}
.sb-wrap{
  background:#000;overflow-x:auto;-webkit-overflow-scrolling:touch;
  border-bottom:1px solid #222;
}
.sb-table{border-collapse:collapse;width:100%;table-layout:fixed}
.sb-head th{
  background:#1a3a1a;color:#fff;font-weight:700;font-size:clamp(9px,2.2vw,13px);
  text-align:center;padding:3px 1px;
  border-right:1px solid #333;white-space:nowrap;cursor:pointer;user-select:none;
}
.sb-head th.cur{background:rgba(245,197,24,.3);color:#f5c518}
.sb-body td{
  border:1px solid #1a1a1a;text-align:center;padding:0;
  vertical-align:middle;cursor:pointer;
}
.sb-body td:first-child{border-left:none;border-right:2px solid #333;width:0;padding:0}
.sb-cell{
  min-height:clamp(36px,9vw,54px);display:flex;align-items:center;justify-content:center;
  font-size:clamp(11px,3vw,17px);font-weight:700;font-variant-numeric:tabular-nums;
}
.sb-cell.blank{color:#1e1e1e}
.sb-cell.cur-top{background:rgba(200,16,46,.12)}
.sb-cell.cur-bot{background:rgba(30,136,229,.12)}
.scores-block{
  display:flex;flex-direction:column;flex-shrink:0;
}
.score-cell{
  display:flex;align-items:center;justify-content:center;
  flex:1;padding:0 16px;
}
.score-cell:first-child{border-bottom:1px solid #1a1a1a}
.score-num{
  font-size:clamp(40px,13vw,72px);font-weight:700;color:#fff;
  font-variant-numeric:tabular-nums;line-height:1;
  min-width:2ch;text-align:center;
}
</style>
</head>
<body>

<div class="top-bar">
  <span class="top-brand">Athlee<span>Live</span></span>
  <button class="top-gear" onclick="openDrawer()">⚙</button>
</div>

<!-- INNING AREA -->
<div class="inning-area">

  <!-- 左: イニング -->
  <div class="inn-block">
    <div class="inn-top-row">
      <div class="inn-num" id="inn-num">1</div>
      <div class="inn-tb">
        <span id="tb-omote" class="active">▲</span>
        <span id="tb-ura">▼</span>
      </div>
    </div>
    <div class="inn-adj">
      <button class="inn-adj-btn" onclick="adjInn(-1)">－</button>
      <button class="inn-adj-btn" onclick="adjInn(+1)">＋</button>
    </div>
  </div>

  <!-- 中: チーム名 + インジケーター -->
  <div class="teams-block">
    <div class="team-row" onclick="setTop(true)">
      <div class="team-ind active" id="ind-away"></div>
      <div class="team-name-disp" id="name-away"
        ontouchstart="startNameEdit('away',event)" ontouchend="cancelNameEdit()"
        onmousedown="startNameEdit('away',event)" onmouseup="cancelNameEdit()" onmouseleave="cancelNameEdit()">先攻</div>
    </div>
    <div class="team-row" onclick="setTop(false)">
      <div class="team-ind" id="ind-home"></div>
      <div class="team-name-disp" id="name-home"
        ontouchstart="startNameEdit('home',event)" ontouchend="cancelNameEdit()"
        onmousedown="startNameEdit('home',event)" onmouseup="cancelNameEdit()" onmouseleave="cancelNameEdit()">後攻</div>
    </div>
  </div>

  <!-- 右: スコア -->
  <div class="scores-block">
    <div class="score-cell"><div class="score-num" id="score-away">0</div></div>
    <div class="score-cell"><div class="score-num" id="score-home">0</div></div>
  </div>

</div>

<!-- スコアボード -->
<div class="sb-wrap">
  <table class="sb-table">
    <thead><tr class="sb-head" id="sb-head"></tr></thead>
    <tbody>
      <tr class="sb-body" id="sb-away"></tr>
      <tr class="sb-body" id="sb-home"></tr>
    </tbody>
  </table>
</div>

<!-- BATTERY ROW -->
<div class="battery-row">
  <div class="battery-cell" style="flex-direction:column;align-items:flex-start;gap:4px">
    <div style="display:flex;align-items:center;gap:8px;width:100%">
      <span class="battery-tag">打</span>
      <select class="battery-sel" id="sel-batter">
        <option value="">-- 打者 --</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;padding-left:4px">
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:8px;color:rgba(255,255,255,.25);white-space:nowrap">次</span>
        <span style="font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis" id="next-batter">-</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:8px;color:rgba(255,255,255,.25);white-space:nowrap">次々</span>
        <span style="font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis" id="next2-batter">-</span>
      </div>
    </div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;border-left:1px solid #1a1a1a">
    <div class="battery-cell" style="border-bottom:1px solid #1a1a1a">
      <span class="battery-tag">投</span>
      <select class="battery-sel" id="sel-pitcher">
        <option value="">-- 投手 --</option>
      </select>
    </div>
    <div class="battery-cell">
      <span class="battery-tag">捕</span>
      <select class="battery-sel" id="sel-catcher">
        <option value="">-- 捕手 --</option>
      </select>
    </div>
  </div>
</div>

<!-- SETTINGS DRAWER -->
<div class="drawer-bg" id="drawer-bg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hdr">
    <span class="drawer-ttl">設定</span>
    <button class="drawer-x" onclick="closeDrawer()">✕</button>
  </div>
  <!-- タブ -->
  <div style="display:flex;background:#2c2c2e;border-radius:8px;padding:3px;gap:2px;margin-bottom:14px">
    <button id="dtab-config-btn" onclick="switchDrawerTab('config')" style="flex:1;padding:7px 0;border:none;border-radius:6px;font-size:12px;font-weight:600;background:#3a3a3c;color:#fff;cursor:pointer">設定</button>
    <button id="dtab-roster-btn" onclick="switchDrawerTab('roster')" style="flex:1;padding:7px 0;border:none;border-radius:6px;font-size:12px;font-weight:600;background:transparent;color:#888;cursor:pointer">選手登録</button>
  </div>

  <!-- 設定タブ -->
  <div id="dtab-config">
    <div class="drawer-sec">
      <div class="drawer-sec-t">最終回</div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="drawer-btn" style="flex:1;font-size:22px;font-weight:700" onclick="adjMaxInn(-1)">－</button>
        <div style="font-size:24px;font-weight:700;color:#fff;min-width:40px;text-align:center" id="max-inn-disp">7</div>
        <button class="drawer-btn" style="flex:1;font-size:22px;font-weight:700" onclick="adjMaxInn(1)">＋</button>
      </div>
    </div>
    <div class="drawer-sec">
      <div class="drawer-sec-t">データリセット</div>
      <div id="rst-step1">
        <button class="drawer-btn danger" onclick="showRstConfirm()">全データリセット</button>
      </div>
      <div id="rst-step2" style="display:none;flex-direction:column;gap:8px">
        <p style="font-size:12px;color:#ff453a;margin-bottom:4px">本当にリセットしますか？この操作は戻せません。</p>
        <button class="drawer-btn danger-confirm" onclick="resetAll()">リセット実行</button>
        <button class="drawer-btn" onclick="hideRstConfirm()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 選手登録タブ -->
  <div id="dtab-roster" style="display:none">
    <div class="drawer-sec">
      <div class="drawer-sec-t">先攻チーム</div>
      <div id="roster-away-list" style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px;max-height:160px;overflow-y:auto"></div>
      <div style="display:flex;gap:6px">
        <input id="roster-away-num"  type="number" placeholder="#" style="width:48px;background:#2c2c2e;border:1px solid #444;border-radius:8px;color:#fff;font-size:13px;padding:6px 8px;outline:none"/>
        <input id="roster-away-name" type="text"   placeholder="選手名" style="flex:1;background:#2c2c2e;border:1px solid #444;border-radius:8px;color:#fff;font-size:13px;padding:6px 8px;outline:none"/>
        <button onclick="addPlayer('away')" style="background:#007aff;border:none;border-radius:8px;color:#fff;font-size:13px;padding:6px 12px;cursor:pointer">追加</button>
      </div>
    </div>
    <div class="drawer-sec">
      <div class="drawer-sec-t">後攻チーム</div>
      <div id="roster-home-list" style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px;max-height:160px;overflow-y:auto"></div>
      <div style="display:flex;gap:6px">
        <input id="roster-home-num"  type="number" placeholder="#" style="width:48px;background:#2c2c2e;border:1px solid #444;border-radius:8px;color:#fff;font-size:13px;padding:6px 8px;outline:none"/>
        <input id="roster-home-name" type="text"   placeholder="選手名" style="flex:1;background:#2c2c2e;border:1px solid #444;border-radius:8px;color:#fff;font-size:13px;padding:6px 8px;outline:none"/>
        <button onclick="addPlayer('home')" style="background:#007aff;border:none;border-radius:8px;color:#fff;font-size:13px;padding:6px 12px;cursor:pointer">追加</button>
      </div>
    </div>
  </div>
</div>

<!-- SCORE INPUT PANEL -->
<div class="sc-bg" id="sc-bg" onclick="closeSC(event)">
  <div class="sc-sheet" onclick="event.stopPropagation()">
    <div class="sc-hdr">
      <span class="sc-title" id="sc-title">スコア入力</span>
      <button class="sc-close-x" onclick="closeSC()">✕</button>
    </div>
    <div class="sc-display" id="sc-display"><span class="sc-blank">－</span></div>
    <div class="sc-btns">
      <button class="sc-btn" onclick="scAdj(-1)">－</button>
      <button class="sc-btn" onclick="scAdj(+1)">＋</button>
      <button class="sc-btn sc-btn-x" id="sc-btn-x" onclick="scToggleX()">×</button>
    </div>
    <button class="sc-done" onclick="closeSC()">閉じる</button>
  </div>
</div>
<div class="field-row">

  <!-- 左: BSO -->
  <div class="bso-block">
    <div class="bso-line"
      ontouchstart="bsoLongStart('b',this)" ontouchend="event.preventDefault();bsoLongEnd('b')" ontouchcancel="bsoLongEnd(null)"
      onclick="bsoClick('b')">
      <span class="bso-lbl">B</span>
      <div class="bso-dots">
        <div class="bdot" id="bd1"></div><div class="bdot" id="bd2"></div><div class="bdot" id="bd3"></div>
      </div>
    </div>
    <div class="bso-line"
      ontouchstart="bsoLongStart('s',this)" ontouchend="event.preventDefault();bsoLongEnd('s')" ontouchcancel="bsoLongEnd(null)"
      onclick="bsoClick('s')">
      <span class="bso-lbl">S</span>
      <div class="bso-dots">
        <div class="bdot" id="sd1"></div><div class="bdot" id="sd2"></div>
      </div>
    </div>
    <div class="bso-line"
      ontouchstart="bsoLongStart('o',this)" ontouchend="event.preventDefault();bsoLongEnd('o')" ontouchcancel="bsoLongEnd(null)"
      onclick="bsoClick('o')">
      <span class="bso-lbl">O</span>
      <div class="bso-dots">
        <div class="bdot out" id="od1"></div><div class="bdot out" id="od2"></div>
      </div>
    </div>
  </div>

  <!-- 右: ダイヤモンド -->
  <div class="diamond-block" style="border-left:1px solid #1a1a1a;border-right:none">
    <svg id="diamond-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg" style="width:clamp(140px,38vw,210px)">
      <!-- ランナーアイコン -->
      <circle id="runner1" cx="84" cy="52" r="7" fill="#f5c518" stroke="#b8860b" stroke-width="1.5" style="display:none;cursor:grab"
        ontouchstart="dragStart(1,event)" ontouchend="dragEnd(event)" ontouchcancel="dragEnd(event)"
        onmousedown="dragStart(1,event)"/>
      <circle id="runner2" cx="50" cy="16" r="7" fill="#f5c518" stroke="#b8860b" stroke-width="1.5" style="display:none;cursor:grab"
        ontouchstart="dragStart(2,event)" ontouchend="dragEnd(event)" ontouchcancel="dragEnd(event)"
        onmousedown="dragStart(2,event)"/>
      <circle id="runner3" cx="16" cy="52" r="7" fill="#f5c518" stroke="#b8860b" stroke-width="1.5" style="display:none;cursor:grab"
        ontouchstart="dragStart(3,event)" ontouchend="dragEnd(event)" ontouchcancel="dragEnd(event)"
        onmousedown="dragStart(3,event)"/>
      <circle id="runner-drag" cx="0" cy="0" r="7" fill="#fff" stroke="#aaa" stroke-width="1.5" style="display:none;pointer-events:none"/>

      <!-- 中央 -1点ボタン -->
      <rect x="38" y="48" width="24" height="14" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"
        id="minus-btn" style="cursor:pointer"/>
      <text x="50" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#888" pointer-events="none">－</text>

      <!-- ベース -->
      <rect x="38" y="10"  width="24" height="24" transform="rotate(45 50 22)" fill="#2a2a2a" stroke="#555" stroke-width="1.5" id="sv-b2"/>
      <rect x="4"  y="40" width="24" height="24" transform="rotate(45 16 52)" fill="#2a2a2a" stroke="#555" stroke-width="1.5" id="sv-b3"/>
      <rect x="72" y="40" width="24" height="24" transform="rotate(45 84 52)" fill="#2a2a2a" stroke="#555" stroke-width="1.5" id="sv-b1"/>

      <!-- ホームベース(＋)加点 -->
      <polygon points="50,95 64,86 64,73 36,73 36,86" fill="#555" stroke="#888" stroke-width="1.5"
        onclick="addRun()" style="cursor:pointer" id="home-plus"/>
      <text x="50" y="89" text-anchor="middle" font-size="15" font-weight="900" fill="#fff" pointer-events="none">＋</text>

      <!-- ベースタップエリア -->
      <rect class="tap-area" x="26" y="0"  width="48" height="36" fill="transparent"
        onclick="tapBase(2)" style="cursor:pointer"/>
      <rect class="tap-area" x="0"  y="28" width="36" height="48" fill="transparent"
        onclick="tapBase(3)" style="cursor:pointer"/>
      <rect class="tap-area" x="64" y="28" width="36" height="48" fill="transparent"
        onclick="tapBase(1)" style="cursor:pointer"/>
    </svg>
  </div>

</div>
<script>
// ── BSO ───────────────────────────────────────────────────────────────────────
const bso = {b:0, s:0, o:0};
const BSO_MAX = {b:4, s:3, o:3};

function adjBSO(k, d){
  const prev = bso[k];
  bso[k] = Math.max(0, Math.min(BSO_MAX[k], bso[k]+d));
  if(bso[k]===prev) return;
  if(d>0){
    if(k==='b' && bso.b>=4){ walk(); bso.b=0; bso.s=0; }
    if(k==='s' && bso.s>=3){ bso.o=Math.min(3,bso.o+1); bso.b=0; bso.s=0; if(bso.o>=3){nextInn();return;} }
    if(k==='o' && bso.o>=3){ nextInn(); return; }
  }
  renderBSO();
}

// フォーボール押し出しロジック
function walk(){
  if(!bases[1]){
    bases[1]=true;
  } else if(!bases[2]){
    bases[2]=true; bases[1]=true;
  } else if(!bases[3]){
    bases[3]=true; bases[2]=true; bases[1]=true;
  } else {
    // 満塁→押し出し1点
    addRun();
    bases[1]=true; bases[2]=true; bases[3]=true;
  }
  renderDiamond();
}

// BSO長押しリセット
let _bsoTimer=null, _bsoFired=false;
function bsoLongStart(k, el){
  _bsoFired=false;
  _bsoTimer=setTimeout(()=>{
    _bsoTimer=null; _bsoFired=true;
    bso[k]=0;
    el.style.background='rgba(255,255,255,.08)';
    setTimeout(()=>el.style.background='',300);
    renderBSO();
  },600);
}
function bsoLongEnd(k){
  if(_bsoTimer){clearTimeout(_bsoTimer);_bsoTimer=null;}
  if(!_bsoFired && k) adjBSO(k,1);
  _bsoFired=false;
}
function bsoClick(k){
  // touchend で処理済みなので何もしない（PC用フォールバックはなし）
}

function renderBSO(){
  for(let i=0;i<3;i++){ const d=document.getElementById('bd'+(i+1)); if(d) d.className='bdot'+(i<bso.b?' on-b':''); }
  for(let i=0;i<2;i++){
    const s=document.getElementById('sd'+(i+1)); if(s) s.className='bdot'+(i<bso.s?' on-s':'');
    const o=document.getElementById('od'+(i+1)); if(o) o.className='bdot out'+(i<bso.o?' on':'');
  }
}

// ── DIAMOND ──────────────────────────────────────────────────────────────────
const bases = {1:false, 2:false, 3:false};

function tapBase(n){ bases[n]=!bases[n]; renderDiamond(); }
function baseLongStart(n){}
function baseLongEnd(n){ tapBase(n); }
function baseLongCancel(){}

// -1点ボタンをJSで登録
window.addEventListener('load',()=>{
  const mb=document.getElementById('minus-btn');
  if(mb){
    mb.addEventListener('click', removeRun);
    mb.addEventListener('touchend', e=>{ e.preventDefault(); removeRun(); });
  }
});

// ── ランナードラッグ&ドロップ ─────────────────────────────────────────────────
// 塁の座標（SVG viewBox 0 0 100 110 基準）
const BASE_POS = { 1:{x:84,y:52}, 2:{x:50,y:16}, 3:{x:16,y:52} };
let _dragBase = null;

function renderDiamond(){
  [1,2,3].forEach(n=>{
    const rect   = document.getElementById('sv-b'+n);
    const runner = document.getElementById('runner'+n);
    if(rect){
      rect.style.fill   = bases[n] ? '#f5c518' : '#2a2a2a';
      rect.style.stroke = bases[n] ? '#b8860b' : '#555';
    }
    if(runner){
      runner.style.display = bases[n] ? '' : 'none';
      runner.setAttribute('cx', BASE_POS[n].x);
      runner.setAttribute('cy', BASE_POS[n].y);
    }
  });
}

function getSVGPoint(svg, clientX, clientY){
  const rect = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  return {
    x: (clientX - rect.left) / rect.width  * vb.width,
    y: (clientY - rect.top)  / rect.height * vb.height
  };
}

function dragStart(base, e){
  if(!bases[base]) return; // ランナーいない
  e.stopPropagation();
  _dragBase = base;
  const svg = document.getElementById('diamond-svg');
  const drag = document.getElementById('runner-drag');
  drag.style.display = '';
  const pt = e.touches
    ? getSVGPoint(svg, e.touches[0].clientX, e.touches[0].clientY)
    : getSVGPoint(svg, e.clientX, e.clientY);
  drag.setAttribute('cx', pt.x);
  drag.setAttribute('cy', pt.y);
  // 元のランナーを薄く
  const orig = document.getElementById('runner'+base);
  if(orig) orig.setAttribute('opacity','0.3');
  // move/end をwindowに登録
  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup',   onDragEnd);
  window.addEventListener('touchmove', onDragMove, {passive:false});
  window.addEventListener('touchend',  onDragEnd);
}

function onDragMove(e){
  if(_dragBase===null) return;
  if(e.cancelable) e.preventDefault();
  const svg = document.getElementById('diamond-svg');
  const drag = document.getElementById('runner-drag');
  const pt = e.touches
    ? getSVGPoint(svg, e.touches[0].clientX, e.touches[0].clientY)
    : getSVGPoint(svg, e.clientX, e.clientY);
  drag.setAttribute('cx', pt.x);
  drag.setAttribute('cy', pt.y);
}

function onDragEnd(e){
  if(_dragBase===null) return;
  const svg = document.getElementById('diamond-svg');
  const pt = e.changedTouches
    ? getSVGPoint(svg, e.changedTouches[0].clientX, e.changedTouches[0].clientY)
    : getSVGPoint(svg, e.clientX, e.clientY);

  // どの塁に近いか判定
  let target = null;
  let minDist = 20; // SVG単位での判定距離
  [1,2,3].forEach(n=>{
    const dx = pt.x - BASE_POS[n].x;
    const dy = pt.y - BASE_POS[n].y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < minDist){ minDist = dist; target = n; }
  });
  // ホームへドロップ（y > 55 かつ x 32-68）判定
  const isHome = pt.y > 55 && pt.x > 32 && pt.x < 68;

  const from = _dragBase;
  _dragBase = null;

  // ドラッグUI終了
  document.getElementById('runner-drag').style.display = 'none';
  const orig = document.getElementById('runner'+from);
  if(orig) orig.setAttribute('opacity','1');
  window.removeEventListener('mousemove', onDragMove);
  window.removeEventListener('mouseup',   onDragEnd);
  window.removeEventListener('touchmove', onDragMove);
  window.removeEventListener('touchend',  onDragEnd);

  if(isHome){
    // ホームへ→得点
    bases[from] = false;
    addRun();
    renderDiamond();
  } else if(target !== null && target !== from){
    // 塁間移動
    bases[from]   = false;
    bases[target] = true;
    renderDiamond();
  } else {
    // どこにも落とさなかった→元に戻す
    renderDiamond();
  }
}

// dragEnd はタップエリアのontouchend経由でも来るので別名で
function dragEnd(e){ onDragEnd(e); }
function addRun(){
  const team=st.top?'away':'home'; const idx=st.inn-1;
  if(scores[team][idx]===null) scores[team][idx]=1;
  else if(typeof scores[team][idx]==='number') scores[team][idx]++;
  renderSB();
}
function removeRun(){
  const team=st.top?'away':'home'; const idx=st.inn-1;
  const cur=scores[team][idx];
  if(cur===0) scores[team][idx]=null;
  else if(typeof cur==='number' && cur>0) scores[team][idx]=cur-1;
  renderSB();
}
function nextInn(){
  bso.b=0; bso.s=0; bso.o=0;
  Object.assign(bases,{1:false,2:false,3:false});
  // 現在の攻撃チームのイニングがnullなら0を入力
  const team=st.top?'away':'home';
  const idx=st.inn-1;
  if(scores[team][idx]===null) scores[team][idx]=0;
  if(st.top) setTop(false);
  else{ adjInn(1); setTop(true); }
  renderBSO(); renderDiamond(); renderSB();
}

const st = { inn:1, top:true, maxInn:7 };
const scores = { away:Array(16).fill(null), home:Array(16).fill(null) };

function setTop(isTop){
  st.top = isTop;
  document.getElementById('ind-away').className = 'team-ind' + (isTop  ? ' active' : '');
  document.getElementById('ind-home').className = 'team-ind' + (!isTop ? ' active' : '');
  document.getElementById('tb-omote').className = isTop  ? 'active' : '';
  document.getElementById('tb-ura').className   = !isTop ? 'active' : '';
  renderSB();
}

function adjInn(d){
  const n = Math.max(st.maxInn, st.inn);
  st.inn = Math.max(1, Math.min(n+1, st.inn + d));
  if(st.inn > st.maxInn) st.maxInn = st.inn;
  document.getElementById('inn-num').textContent = st.inn;
  renderSB();
}

function renderSB(){
  const n = Math.max(st.maxInn, st.inn);
  const head = document.getElementById('sb-head');
  head.innerHTML = '<th style="width:0;padding:0"></th>';
  for(let i=1;i<=n;i++){
    head.innerHTML += `<th class="${i===st.inn?'cur':''}" onclick="setCurrentInn(${i})">${i}</th>`;
  }
  buildRow('sb-away','away',n);
  buildRow('sb-home','home',n);
  renderTotals();
}

function buildRow(rowId, team, n){
  const row = document.getElementById(rowId);
  row.innerHTML = '<td style="width:0;padding:0"></td>';
  for(let i=0;i<n;i++){
    const isCur = i+1 === st.inn;
    const val = scores[team][i];
    const xFlag = xOn[`${team}-${i}`]||false;
    let cls = 'sb-cell';
    if(isCur) cls += st.top ? ' cur-top' : ' cur-bot';
    let disp;
    if(val===null) disp='<span style="color:#1e1e1e">－</span>';
    else if(val==='x') disp='<span style="color:#555">×</span>';
    else disp=`${val}${xFlag?'<span style="color:rgba(255,90,90,.7);font-size:.7em">×</span>':''}`;
    row.innerHTML += `<td onclick="openScoreInput('${team}',${i})"><div class="${cls}">${disp}</div></td>`;
  }
}

function renderTotals(){
  const n = Math.max(st.maxInn, st.inn);
  ['away','home'].forEach(t=>{
    const tot = scores[t].slice(0,n).filter(x=>typeof x==='number').reduce((a,b)=>a+b,0);
    const el = document.getElementById('score-'+t);
    if(el) el.textContent = tot;
  });
}

function setCurrentInn(n){ st.inn=n; document.getElementById('inn-num').textContent=n; renderSB(); }

// ── SCORE INPUT PANEL ────────────────────────────────────────────────────────
let _scTeam=null, _scIdx=null;
const xOn={}; // 延長✕フラグ

function openScoreInput(team, idx){
  _scTeam=team; _scIdx=idx;
  const tName = team==='away'
    ? document.getElementById('name-away').textContent
    : document.getElementById('name-home').textContent;
  document.getElementById('sc-title').textContent = `${tName} ${idx+1}回`;
  refreshSCDisplay();
  document.getElementById('sc-bg').className='sc-bg open';
}

function closeSC(e){
  if(e && e.target !== document.getElementById('sc-bg')) return;
  document.getElementById('sc-bg').className='sc-bg';
  _scTeam=null; _scIdx=null;
}

function refreshSCDisplay(){
  if(!_scTeam) return;
  const val = scores[_scTeam][_scIdx];
  const xFlag = xOn[`${_scTeam}-${_scIdx}`]||false;
  const disp = document.getElementById('sc-display');
  const xBtn = document.getElementById('sc-btn-x');
  if(val===null){
    disp.innerHTML='<span class="sc-blank">－</span>';
    xBtn.className='sc-btn sc-btn-x';
  } else if(val==='x'){
    disp.innerHTML='<span class="sc-num">×</span>';
    xBtn.className='sc-btn sc-btn-x active';
  } else {
    const xp = xFlag?'<span class="sc-x-disp">×</span>':'';
    disp.innerHTML=`<span class="sc-num">${val}</span>${xp}`;
    xBtn.className='sc-btn sc-btn-x'+(xFlag?' active':'');
  }
}

function scAdj(d){
  if(!_scTeam) return;
  const cur = scores[_scTeam][_scIdx];
  if(cur===null||cur==='x'){
    if(d>0) scores[_scTeam][_scIdx]=0;
  } else if(cur===0 && d<0){
    scores[_scTeam][_scIdx]=null;
    xOn[`${_scTeam}-${_scIdx}`]=false;
  } else {
    scores[_scTeam][_scIdx]=Math.max(0,Math.min(99,cur+d));
  }
  refreshSCDisplay(); renderSB();
}

function scToggleX(){
  if(!_scTeam) return;
  const cur = scores[_scTeam][_scIdx];
  const key = `${_scTeam}-${_scIdx}`;
  if(typeof cur==='number'){
    xOn[key]=!xOn[key];
  } else if(cur==='x'){
    scores[_scTeam][_scIdx]=null; xOn[key]=false;
  } else {
    scores[_scTeam][_scIdx]='x'; xOn[key]=false;
  }
  refreshSCDisplay(); renderSB();
}

// ── チーム名長押し編集 ────────────────────────────────────────────────────────
let _nameTimer = null;
function startNameEdit(team, e){
  e.stopPropagation();
  _nameTimer = setTimeout(()=>{
    _nameTimer = null;
    const disp = document.getElementById('name-'+team);
    const current = disp.textContent;
    const input = document.createElement('input');
    input.className = 'team-name-in';
    input.value = current;
    input.onclick = e => e.stopPropagation();
    input.onblur = ()=>{
      const val = input.value.trim() || current;
      disp.textContent = val;
      input.replaceWith(disp);
      try{ localStorage.setItem('bb_'+team, val); }catch(e){}
    };
    input.onkeydown = e=>{ if(e.key==='Enter') input.blur(); };
    disp.replaceWith(input);
    input.focus();
    input.select();
  }, 600);
}
function cancelNameEdit(){
  if(_nameTimer){ clearTimeout(_nameTimer); _nameTimer = null; }
}

// ── チーム名読み込み ───────────────────────────────────────────────────────────
(function(){
  ['away','home'].forEach(t=>{
    try{
      const v = localStorage.getItem('bb_'+t);
      if(v) document.getElementById('name-'+t).textContent = v;
    }catch(e){}
  });
})();

// ── DRAWER TABS ──────────────────────────────────────────────────────────────
function switchDrawerTab(tab){
  document.getElementById('dtab-config').style.display = tab==='config'?'':'none';
  document.getElementById('dtab-roster').style.display = tab==='roster'?'':'none';
  document.getElementById('dtab-config-btn').style.background = tab==='config'?'#3a3a3c':'transparent';
  document.getElementById('dtab-config-btn').style.color      = tab==='config'?'#fff':'#888';
  document.getElementById('dtab-roster-btn').style.background = tab==='roster'?'#3a3a3c':'transparent';
  document.getElementById('dtab-roster-btn').style.color      = tab==='roster'?'#fff':'#888';
  if(tab==='roster') renderRosters();
}

// ── ROSTER ────────────────────────────────────────────────────────────────────
const rosters = { away:[], home:[] };

function addPlayer(team){
  const num  = document.getElementById('roster-'+team+'-num').value.trim();
  const name = document.getElementById('roster-'+team+'-name').value.trim();
  if(!name) return;
  rosters[team].push({ id:Date.now(), num, name });
  document.getElementById('roster-'+team+'-num').value  = '';
  document.getElementById('roster-'+team+'-name').value = '';
  renderRosters();
  updateSelects();
}

function deletePlayer(team, id){
  rosters[team] = rosters[team].filter(p=>p.id!==id);
  renderRosters();
  updateSelects();
}

function renderRosters(){
  ['away','home'].forEach(team=>{
    const list = document.getElementById('roster-'+team+'-list');
    if(!list) return;
    list.innerHTML = rosters[team].length
      ? rosters[team].map(p=>`
        <div style="display:flex;align-items:center;gap:8px;background:#2c2c2e;border-radius:7px;padding:6px 10px">
          <span style="font-size:11px;color:#888;min-width:28px">${p.num?'#'+p.num:''}</span>
          <span style="flex:1;font-size:13px;color:#fff">${p.name}</span>
          <button onclick="deletePlayer('${team}',${p.id})" style="background:none;border:none;color:#ff453a;font-size:14px;cursor:pointer;padding:0 2px">×</button>
        </div>`).join('')
      : '<div style="font-size:11px;color:#555;padding:4px">選手なし</div>';
  });
}

function updateSelects(){
  ['batter','pitcher','catcher'].forEach(role=>{
    const sel = document.getElementById('sel-'+role);
    if(!sel) return;
    const cur = sel.value;
    const label = role==='batter'?'-- 打者 --':role==='pitcher'?'-- 投手 --':'-- 捕手 --';
    const all = [...rosters.away, ...rosters.home];
    sel.innerHTML = `<option value="">${label}</option>`
      + all.map(p=>`<option value="${p.id}"${p.id==cur?' selected':''}>${p.num?'#'+p.num+' ':''}${p.name}</option>`).join('');
  });
}
function adjMaxInn(d){
  st.maxInn = Math.max(3, Math.min(15, st.maxInn + d));
  const e = document.getElementById('max-inn-disp');
  if(e) e.textContent = st.maxInn;
  renderSB();
}
function openDrawer(){
  document.getElementById('drawer').className='drawer open';
  document.getElementById('drawer-bg').className='drawer-bg open';
  const e=document.getElementById('max-inn-disp');
  if(e) e.textContent=st.maxInn;
  hideRstConfirm();
}
function closeDrawer(){
  document.getElementById('drawer').className='drawer';
  document.getElementById('drawer-bg').className='drawer-bg';
}
function showRstConfirm(){
  document.getElementById('rst-step1').style.display='none';
  document.getElementById('rst-step2').style.display='flex';
}
function hideRstConfirm(){
  document.getElementById('rst-step1').style.display='block';
  document.getElementById('rst-step2').style.display='none';
}
function resetAll(){
  scores.away=Array(16).fill(null);
  scores.home=Array(16).fill(null);
  for(const k in xOn) delete xOn[k];
  bso.b=0; bso.s=0; bso.o=0;
  Object.assign(bases,{1:false,2:false,3:false});
  st.inn=1; st.top=true; st.maxInn=7;
  document.getElementById('inn-num').textContent=1;
  renderSB(); renderBSO(); renderDiamond(); setTop(true);
  closeDrawer();
}

// 初期描画
renderSB();
</script>
